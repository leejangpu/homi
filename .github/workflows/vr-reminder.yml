name: VR 리밸런싱 2주 리마인더

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 09:00 KST (00:00 UTC)
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Check if biweekly Monday
        id: check
        run: |
          # 첫 알림 기준일: 2026-05-18
          START_SEC=$(date -d "2026-05-18" +%s)
          TODAY_SEC=$(date -u -d "$(date -u +%Y-%m-%d)" +%s)
          DIFF_DAYS=$(( (TODAY_SEC - START_SEC) / 86400 ))
          if [ $DIFF_DAYS -ge 0 ] && [ $(( DIFF_DAYS % 14 )) -eq 0 ]; then
            echo "send=true" >> $GITHUB_OUTPUT
          else
            echo "send=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram reminder
        if: steps.check.outputs.send == 'true'
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=⚖️ VR 리밸런싱 2주 사이클 알림 ($TODAY)

오늘 VR 계산기에서 새 V값을 계산하고 주문을 업데이트하세요!

🔗 https://leejangpu.github.io/homi/financial/#vr-calc

확인할 항목:
• 현재가, 보유수량, Pool 최신값으로 업데이트
• 새 V값 및 밴드 범위 확인
• 매수/매도 주문 가격 업데이트 후 ☁️ 저장" \
            --data-urlencode "parse_mode=HTML"

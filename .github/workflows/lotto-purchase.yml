name: 로또 자동 구매

on:
  schedule:
    # 매주 월요일 10:00 KST (01:00 UTC)
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  purchase:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: lotto
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi
          source .venv/bin/activate
          pip install -q -r requirements.txt
          playwright install chromium

      - name: Run lotto purchase
        env:
          LOTTO_USER_ID: ${{ secrets.LOTTO_USER_ID }}
          LOTTO_USER_PW: ${{ secrets.LOTTO_USER_PW }}
          LOTTO_TICKET_COUNT: ${{ secrets.LOTTO_TICKET_COUNT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .venv/bin/activate
          python3 main.py

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lotto-screenshots
          path: lotto/screenshots/
          retention-days: 7

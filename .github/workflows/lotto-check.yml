name: 로또 당첨 확인

on:
  schedule:
    - cron: '0 13 * * 6'  # 매주 토요일 22:00 KST (13:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lotto
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -q -r requirements.txt
          playwright install --with-deps chromium

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check lotto results
        env:
          LOTTO_USER_ID: ${{ secrets.LOTTO_USER_ID }}
          LOTTO_USER_PW: ${{ secrets.LOTTO_USER_PW }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source .venv/bin/activate
          python3 main.py --check

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lotto-check-screenshots
          path: lotto/screenshots/
          retention-days: 7

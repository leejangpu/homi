<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재무재표 - 순애&장훈이네</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jexcel.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --primary:#2dd4bf; --primary-light:#5eead4;
    --bg:#070b14; --bg-card:rgba(255,255,255,0.035); --bg-hover:rgba(255,255,255,0.06);
    --text:#eef2ff; --text-muted:#7a8ba0; --text-dim:#4a5c6e; --border:rgba(255,255,255,0.08);
    --green:#34d399; --green-bg:rgba(52,211,153,0.1);
    --red:#fb7185; --red-bg:rgba(251,113,133,0.1);
    --blue:#60a5fa; --blue-bg:rgba(96,165,250,0.1);
    --amber:#fbbf24; --amber-bg:rgba(251,191,36,0.1);
    --pink:#f472b6; --pink-bg:rgba(244,114,182,0.1);
    --cyan:#2dd4bf; --cyan-bg:rgba(45,212,191,0.1);
    --gold:#f59e0b;
    --radius:16px; --pad:28px;
    --font-ui:'Manrope','Noto Sans KR',sans-serif;
    --font-num:'IBM Plex Mono','Manrope',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:var(--font-ui);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    /* Atmospheric background */
    background-image:
      radial-gradient(ellipse 80% 50% at 10% 0%, rgba(45,212,191,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(245,158,11,0.04) 0%, transparent 60%);
    background-attachment:fixed;
  }

  /* Noise texture overlay */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    opacity:0.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size:200px 200px;
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  .header{
    background:rgba(7,11,20,0.85);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    padding:14px var(--pad);
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:100;
  }
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{
    width:36px;height:36px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:800;
    color:#070b14;
    box-shadow:0 0 20px rgba(45,212,191,0.25);
  }
  .logo h1{font-size:16px;font-weight:800;letter-spacing:-0.4px;color:var(--text);}
  .logo .sub{font-size:11px;color:var(--text-muted);margin-top:1px;font-weight:500;letter-spacing:.3px;}

  /* ── YEAR TABS ── */
  .year-tabs{
    display:flex;gap:0;
    padding:0 var(--pad);
    background:rgba(7,11,20,0.7);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .year-tab{
    padding:12px 28px;
    background:transparent;
    color:var(--text-dim);
    border:none;cursor:pointer;
    font-family:var(--font-ui);
    font-size:13px;font-weight:700;
    letter-spacing:.4px;
    position:relative;transition:color .2s;
    text-transform:uppercase;
  }
  .year-tab:hover{color:var(--text-muted);}
  .year-tab.active{color:var(--primary);}
  .year-tab.active::after{
    content:'';position:absolute;
    bottom:-1px;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--primary),transparent);
  }

  /* ── SECTION TABS ── */
  .section-tabs{
    display:flex;gap:4px;
    padding:10px var(--pad);
    background:transparent;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .section-tabs::-webkit-scrollbar{display:none;}
  .sec-tab{
    padding:7px 16px;
    border-radius:8px;
    border:1px solid transparent;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-family:var(--font-ui);
    font-size:12px;font-weight:600;
    letter-spacing:.2px;
    transition:all .15s;
    white-space:nowrap;flex-shrink:0;
  }
  .sec-tab:hover{color:var(--text-muted);background:var(--bg-hover);}
  .sec-tab.active{
    background:rgba(45,212,191,0.12);
    border-color:rgba(45,212,191,0.3);
    color:var(--primary);
  }
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;}

  /* ── CONTENT ── */
  .content{padding:20px var(--pad) 48px;position:relative;z-index:1;}

  /* ── MONTH SELECTOR ── */
  .month-selector{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .month-selector label{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
  .month-pills{display:flex;gap:4px;flex-wrap:wrap;}
  .month-pill{
    padding:5px 12px;border-radius:6px;
    border:1px solid transparent;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-family:var(--font-num);
    font-size:11px;font-weight:500;
    transition:all .15s;
  }
  .month-pill:hover{border-color:var(--border);color:var(--text-muted);}
  .month-pill.active{
    background:rgba(45,212,191,0.12);
    border-color:rgba(45,212,191,0.35);
    color:var(--primary);
    font-weight:600;
  }
  .month-pill.disabled{opacity:0.25;pointer-events:none;}

  /* ── DASHBOARD CARDS ── */
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
  .dash-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 22px;
    transition:all .2s;
    position:relative;
    overflow:hidden;
  }
  .dash-card::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(45,212,191,0.2),transparent);
    opacity:0;transition:opacity .2s;
  }
  .dash-card:hover{border-color:rgba(45,212,191,0.2);transform:translateY(-1px);box-shadow:0 8px 32px rgba(0,0,0,.3);}
  .dash-card:hover::before{opacity:1;}
  .card-label{
    font-size:10px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.8px;
    margin-bottom:10px;
    display:flex;align-items:center;gap:7px;
    font-weight:700;
  }
  .card-icon{
    width:24px;height:24px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .card-value{
    font-family:var(--font-num);
    font-size:21px;font-weight:600;
    letter-spacing:-.5px;margin-bottom:6px;
    color:var(--text);
  }
  .card-change{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px;}
  .card-change.up{color:var(--green);}
  .card-change.down{color:var(--red);}

  /* ── CHARTS ── */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
  .chart-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px 20px;
    transition:border-color .2s;
  }
  .chart-card:hover{border-color:rgba(45,212,191,0.15);}
  .chart-card h3{
    font-size:11px;font-weight:700;
    color:var(--text-dim);
    margin-bottom:14px;
    text-transform:uppercase;letter-spacing:.6px;
  }
  .chart-card.full{grid-column:1/-1;}

  /* ── MILESTONE ── */
  .milestone-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px 26px;
    margin-bottom:20px;
    position:relative;overflow:hidden;
  }
  .milestone-card::after{
    content:'';position:absolute;
    top:-60px;right:-60px;
    width:180px;height:180px;
    background:radial-gradient(circle,rgba(45,212,191,0.04) 0%,transparent 70%);
    pointer-events:none;
  }
  .milestone-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .milestone-header h3{font-size:13px;font-weight:800;color:var(--text);margin:0;letter-spacing:-.2px;}
  .milestone-header .milestone-meta{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:.3px;}
  .milestone-bar-wrap{
    position:relative;height:24px;
    background:rgba(255,255,255,0.05);
    border-radius:12px;overflow:hidden;
    margin-bottom:16px;
    border:1px solid rgba(255,255,255,0.04);
  }
  .milestone-bar-fill{
    height:100%;border-radius:12px;
    background:linear-gradient(90deg,var(--primary),var(--gold));
    transition:width .8s cubic-bezier(.23,1,.32,1);
    position:relative;min-width:28px;
    box-shadow:0 0 16px rgba(45,212,191,0.35);
    display:flex;align-items:center;justify-content:flex-end;
  }
  .milestone-bar-fill::after{
    content:attr(data-pct);
    padding-right:10px;
    font-family:var(--font-num);
    font-size:11px;font-weight:700;
    color:#070b14;
    white-space:nowrap;
  }
  .milestone-markers{display:flex;justify-content:space-between;position:relative;padding:0;}
  .milestone-marker{display:flex;flex-direction:column;align-items:center;position:relative;}
  .milestone-marker .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.1);margin-bottom:5px;}
  .milestone-marker .dot.reached{background:var(--primary);}
  .milestone-marker .dot.current{background:var(--gold);box-shadow:0 0 8px rgba(245,158,11,.5);}
  .milestone-marker .yr{font-size:10px;color:var(--text-dim);font-weight:600;font-family:var(--font-num);}
  .milestone-marker .amt{font-size:9px;color:var(--text-dim);font-weight:500;margin-top:1px;}
  .milestone-stats{display:flex;gap:24px;margin-top:16px;flex-wrap:wrap;}
  .milestone-stat{font-size:12px;color:var(--text-dim);}
  .milestone-stat strong{color:var(--text);font-weight:700;font-family:var(--font-num);}

  /* ── SUMMARY BANNER ── */
  .summary-banner{
    background:linear-gradient(135deg,rgba(45,212,191,0.06) 0%,rgba(7,11,20,0) 60%),
               rgba(255,255,255,0.03);
    border:1px solid rgba(45,212,191,0.15);
    border-radius:var(--radius);
    padding:20px 24px;
    margin-bottom:20px;
    position:relative;overflow:hidden;
  }
  .summary-banner::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,rgba(45,212,191,0.6),transparent 50%);
  }
  .summary-banner .summary-title{
    font-size:12px;font-weight:800;
    color:var(--primary);
    margin-bottom:10px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    text-transform:uppercase;letter-spacing:.6px;
  }
  .summary-banner .summary-body{font-size:13px;color:var(--text);line-height:1.75;font-weight:400;}
  .summary-banner .summary-body .highlight{color:var(--green);font-weight:700;}
  .summary-banner .summary-body .warn{color:var(--amber);font-weight:700;}
  .summary-banner .summary-body .down{color:var(--red);font-weight:700;}
  .summary-banner .summary-tag{
    display:inline-block;padding:2px 8px;
    border-radius:5px;font-size:10px;font-weight:700;
    margin-right:4px;letter-spacing:.3px;
  }
  .summary-banner .tag-up{background:rgba(52,211,153,0.12);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
  .summary-banner .tag-down{background:rgba(251,113,133,0.12);color:var(--red);border:1px solid rgba(251,113,133,0.2);}
  .summary-banner .tag-neutral{background:rgba(122,139,160,0.1);color:var(--text-muted);border:1px solid rgba(122,139,160,0.15);}

  /* ── TABLE ── */
  .mtable{width:100%;border-collapse:collapse;margin-top:12px;}
  .mtable th{
    text-align:left;padding:9px 12px;
    font-size:10px;color:var(--text-dim);
    border-bottom:1px solid var(--border);
    font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  }
  .mtable td{
    padding:10px 12px;font-size:13px;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .mtable tr:last-child td{border-bottom:none;}
  .mtable tr:hover td{background:rgba(255,255,255,0.02);}
  .mtable .n{text-align:right;font-family:var(--font-num);font-size:12px;font-variant-numeric:tabular-nums;}
  .mtable .pos{color:var(--green);}
  .mtable .neg{color:var(--red);}
  .mtable .hl{background:rgba(45,212,191,0.05);}
  .mtable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* ── SHEET TOOLBAR ── */
  .sheet-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .btn{
    padding:7px 14px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--bg-card);
    color:var(--text-muted);
    cursor:pointer;
    font-family:var(--font-ui);
    font-size:12px;font-weight:600;
    transition:all .15s;
    letter-spacing:.2px;
  }
  .btn:hover{background:var(--bg-hover);color:var(--text);border-color:rgba(45,212,191,0.3);}
  .btn.primary{background:var(--primary);color:#070b14;border-color:var(--primary);font-weight:700;}
  .btn.primary:hover{background:var(--primary-light);}
  .sheet-status{margin-left:auto;font-size:11px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s;letter-spacing:.3px;}
  .sheet-status.show{opacity:1;}

  /* ── JSPREADSHEET DARK ── */
  .jexcel_container{background:var(--bg-card)!important;border-radius:12px!important;overflow:hidden!important;border:1px solid var(--border)!important;}
  .jexcel{background:rgba(7,11,20,0.8)!important;}
  .jexcel td{background:rgba(12,18,30,0.9)!important;color:var(--text)!important;border-color:rgba(255,255,255,0.05)!important;font-size:13px!important;font-family:var(--font-ui)!important;}
  .jexcel thead td{background:rgba(7,11,20,0.95)!important;color:var(--text-muted)!important;font-weight:700!important;border-color:rgba(255,255,255,0.06)!important;}
  .jexcel tbody tr td:first-child{background:rgba(7,11,20,0.95)!important;color:var(--text-dim)!important;}
  .jexcel td.highlight{background:rgba(45,212,191,0.08)!important;}
  .jexcel td.selected,.jexcel td.selection{background:rgba(45,212,191,0.12)!important;border:1px solid rgba(45,212,191,0.4)!important;}
  .jexcel>thead>tr>td.selected{background:var(--primary)!important;color:#070b14!important;}
  .jexcel>tbody>tr>td:first-child.selected{background:var(--primary)!important;color:#070b14!important;}
  .jexcel .highlight-left{border-left:2px solid var(--primary)!important;}
  .jexcel .highlight-right{border-right:2px solid var(--primary)!important;}
  .jexcel .highlight-top{border-top:2px solid var(--primary)!important;}
  .jexcel .highlight-bottom{border-bottom:2px solid var(--primary)!important;}
  .jexcel_contextmenu{background:rgba(12,18,30,0.98)!important;border:1px solid var(--border)!important;border-radius:10px!important;box-shadow:0 12px 40px rgba(0,0,0,.6)!important;}
  .jexcel_contextmenu>div{color:var(--text)!important;}
  .jexcel_contextmenu>div:hover{background:var(--bg-hover)!important;}
  .jexcel td.cell-header{background:rgba(45,212,191,0.07)!important;color:var(--primary-light)!important;font-weight:700!important;font-size:12px!important;letter-spacing:.3px;}
  .jexcel td.cell-category{background:rgba(7,11,20,0.8)!important;color:var(--cyan)!important;font-weight:600!important;}
  .jexcel td.cell-subcategory{background:rgba(10,16,26,0.8)!important;color:var(--text)!important;}
  .jexcel td.cell-owner{background:rgba(10,16,26,0.8)!important;color:var(--text-muted)!important;text-align:center!important;font-size:12px!important;}
  .jexcel td.cell-total{background:rgba(45,212,191,0.05)!important;color:var(--primary-light)!important;font-weight:700!important;}

  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.14);}

  /* ECharts container sizing — explicit block dimensions required */

  /* ── MOBILE ── */
  @media(max-width:768px){
    :root{--pad:16px;}
    .header{padding:11px var(--pad);}
    .logo-icon{width:30px;height:30px;font-size:13px;}
    .logo h1{font-size:14px;}
    .year-tab{padding:10px 18px;font-size:12px;}
    .section-tabs{padding:8px var(--pad);gap:4px;}
    .sec-tab{padding:6px 12px;font-size:11px;}
    .content{padding:14px var(--pad) 32px;}
    .dash-grid{grid-template-columns:1fr 1fr;gap:10px;}
    .card-value{font-size:16px;}
    .card-label{font-size:9px;}
    .card-icon{width:20px;height:20px;font-size:10px;}
    .chart-row{grid-template-columns:1fr;gap:10px;}
    .month-pills{gap:3px;}
    .month-pill{padding:5px 9px;font-size:10px;}
    .mtable th,.mtable td{padding:8px 9px;font-size:12px;}
    .milestone-stats{gap:12px;}
    .milestone-marker .yr{font-size:9px;}
    .milestone-marker .amt{font-size:9px;}
    .milestone-bar-wrap{height:8px;}
    .milestone-card{padding:18px 18px;}
  }
  @media(max-width:400px){
    .dash-grid{grid-template-columns:1fr;gap:8px;}
    .card-value{font-size:19px;}
  }

  /* ── LOCK SCREEN ── */
  #lockScreen{
    position:fixed;inset:0;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 0%,rgba(45,212,191,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%,rgba(245,158,11,0.05) 0%,transparent 60%);
  }
  .lock-box{
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:44px 40px;
    width:320px;max-width:90vw;
    text-align:center;
    backdrop-filter:blur(20px);
    position:relative;overflow:hidden;
  }
  .lock-box::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(45,212,191,0.4),transparent);
  }
  .lock-icon{font-size:32px;margin-bottom:18px;filter:drop-shadow(0 0 12px rgba(45,212,191,0.3));}
  .lock-box h2{font-size:20px;font-weight:800;margin-bottom:5px;letter-spacing:-.4px;}
  .lock-box p{font-size:12px;color:var(--text-dim);margin-bottom:28px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;}
  .lock-input{
    width:100%;padding:14px 18px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:10px;
    color:var(--text);
    font-size:22px;text-align:center;
    letter-spacing:10px;outline:none;
    transition:all .2s;
    font-family:var(--font-num);
  }
  .lock-input:focus{border-color:rgba(45,212,191,0.4);background:rgba(45,212,191,0.04);}
  .lock-error{color:var(--red);font-size:11px;margin-top:8px;height:16px;font-weight:600;letter-spacing:.3px;}
  .lock-btn{
    width:100%;margin-top:16px;padding:13px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    border:none;border-radius:10px;
    color:#070b14;font-size:14px;font-weight:800;
    cursor:pointer;transition:all .2s;
    letter-spacing:.4px;text-transform:uppercase;
    font-family:var(--font-ui);
  }
  .lock-btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(45,212,191,0.2);}

  /* ── AI BRIEFING ── */
  .summary-banner{
    background:linear-gradient(135deg,rgba(45,212,191,0.06) 0%,rgba(7,11,20,0.95) 70%);
    border:1px solid rgba(45,212,191,0.2);
    border-radius:var(--radius);
    padding:22px 26px;
    margin-bottom:20px;
    position:relative;overflow:hidden;
  }
  /* Top glow line */
  .summary-banner::before{

    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 0%,rgba(45,212,191,0.8) 30%,rgba(245,158,11,0.6) 70%,transparent 100%);
  }
  /* Scanning animation */
  .summary-banner::after{
    content:'';position:absolute;
    top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(45,212,191,0.04),transparent);
    animation:aiScan 5s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes aiScan{0%{left:-60%}100%{left:160%}}
  /* Corner accent */
  .summary-banner .ai-corner{
    position:absolute;top:0;right:0;
    width:80px;height:80px;
    background:radial-gradient(circle at top right,rgba(45,212,191,0.08),transparent 70%);
    pointer-events:none;
  }
  .summary-banner .summary-title{
    font-size:11px;font-weight:800;
    color:var(--primary);
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    text-transform:uppercase;letter-spacing:.8px;
  }
  .ai-badge{
    display:inline-flex;align-items:center;gap:4px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    color:#070b14;font-size:9px;font-weight:900;
    padding:3px 7px;border-radius:4px;letter-spacing:1.5px;
  }
  .ai-badge::before{
    content:'';display:inline-block;
    width:5px;height:5px;border-radius:50%;
    background:#070b14;
    animation:aiPulse 1.5s ease-in-out infinite;
  }
  @keyframes aiPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
  .summary-banner .summary-body{
    font-size:13.5px;color:rgba(238,242,255,0.85);
    line-height:1.8;font-weight:400;
    position:relative;z-index:1;
  }
  .summary-banner .summary-body .highlight{color:var(--green);font-weight:700;}
  .summary-banner .summary-body .warn{color:var(--amber);font-weight:700;}
  .summary-banner .summary-body .down{color:var(--red);font-weight:700;}
  .summary-banner .summary-body .up-color{color:#60a5fa;font-weight:600;}
  .summary-banner .summary-body .down-color{color:#fb7185;font-weight:600;}
  .summary-banner .summary-tag{
    display:inline-block;padding:2px 8px;
    border-radius:4px;font-size:10px;font-weight:700;
    margin-right:4px;letter-spacing:.4px;
    vertical-align:middle;
  }
  .summary-banner .tag-up{background:rgba(52,211,153,0.15);color:var(--green);border:1px solid rgba(52,211,153,0.25);}
  .summary-banner .tag-down{background:rgba(251,113,133,0.15);color:var(--red);border:1px solid rgba(251,113,133,0.25);}
  .summary-banner .tag-neutral{background:rgba(122,139,160,0.1);color:var(--text-muted);border:1px solid rgba(122,139,160,0.15);}
  /* Typewriter reveal for AI body */
  .summary-banner.is-ai .summary-body{animation:fadeIn .6s ease .2s both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* ── ANIMATIONS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:fadeUp .3s ease;}
  .dash-card{animation:fadeUp .35s ease both;}
  .dash-card:nth-child(1){animation-delay:.04s;}
  .dash-card:nth-child(2){animation-delay:.08s;}
  .dash-card:nth-child(3){animation-delay:.12s;}
  .dash-card:nth-child(4){animation-delay:.16s;}

  @media(max-width:768px){
    .summary-banner{padding:16px 18px;}
    .summary-banner .summary-body{font-size:12.5px;}
  }
</style>

<body>

<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>재무재표</h2>
    <p>순애 &amp; 장훈이네</p>
    <input class="lock-input" id="pwInput" type="password" maxlength="10" placeholder="••••" autofocus
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lock-error" id="pwError"></div>
    <button class="lock-btn" onclick="checkPw()">확인</button>
  </div>
</div>

<div id="appWrap" style="display:none">
<div class="header">
  <div class="logo">
    <div class="logo-icon">$</div>
    <div><h1>재무재표</h1><div class="sub">순애 &amp; 장훈이네</div></div>
  </div>
</div>
<div class="year-tabs" id="yearTabs"></div>
<div class="section-tabs" id="sectionTabs"></div>
<div class="content" id="content"></div>
</div><!-- /appWrap -->

<script src="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jexcel.min.js"></script>
<script>
// ===== Auth =====
const PW_HASH = '5e88489b5e88489b'; // internal marker
function checkPw(){
  const v = document.getElementById('pwInput').value;
  if(v === '0907'){
    sessionStorage.setItem('auth','1');
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('appWrap').style.display='';
    init();
  } else {
    const el = document.getElementById('pwError');
    el.textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>el.textContent='', 2000);
  }
}
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('appWrap').style.display='';
}

// ===== State =====
const rawSheets={};
const sections={};
let activeYear=null, activeSection='dashboard', selectedMonthIdx=-1;
let assetViewMode='group'; // 'group' or 'detail'
let jexcelInstance=null;
let chartInstances=[];
let aiSummaries={}; // loaded from summary.json

const TODAY=new Date();
const THIS_MONTH=TODAY.getMonth()+1; // 1-12
const THIS_YEAR=TODAY.getFullYear();

// ===== Utils =====
function parseCSV(t){const rows=[];let c='',q=false,row=[];for(let i=0;i<t.length;i++){const ch=t[i];if(q){if(ch==='"'&&t[i+1]==='"'){c+='"';i++;}else if(ch==='"')q=false;else c+=ch;}else{if(ch==='"')q=true;else if(ch===','){row.push(c);c='';}else if(ch==='\n'||(ch==='\r'&&t[i+1]==='\n')){row.push(c);c='';rows.push(row);row=[];if(ch==='\r')i++;}else c+=ch;}}if(c||row.length){row.push(c);rows.push(row);}const mx=Math.max(...rows.map(r=>r.length));rows.forEach(r=>{while(r.length<mx)r.push('');});return rows;}
function toCSV(d){return d.map(r=>r.map(c=>{const s=String(c??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');}
function parseNum(s){if(!s)return 0;s=String(s).trim().replace(/[₩,\s]/g,'');if(!s||s==='-'||s.startsWith('#'))return 0;const n=parseFloat(s);return isNaN(n)?0:n;}
function fmtNum(n){if(n===0)return'-';return n.toLocaleString('ko-KR');}
function fmtWon(n){if(!n)return'-';const a=Math.abs(n);const sign=n<0?'-':'';if(a<10000)return sign+a.toLocaleString('ko-KR')+'원';return sign+Math.round(a/10000).toLocaleString('ko-KR')+'만원';}
function destroyCharts(){chartInstances.forEach(c=>{try{c.dispose();}catch(e){}});chartInstances=[];}

function initChart(el,opts){
  const c=echarts.init(el,null,{renderer:'canvas'});
  c.setOption(opts);chartInstances.push(c);
  return c;
}
const ecTextStyle={color:'#7a8ba0',fontFamily:'Manrope,Noto Sans KR,sans-serif'};
const ecAxisLine={lineStyle:{color:'rgba(255,255,255,0.05)'}};
const ecSplitLine={lineStyle:{color:'rgba(255,255,255,0.05)',type:'dashed'}};
const ecTooltip={backgroundColor:'rgba(15,20,35,0.95)',borderColor:'rgba(255,255,255,0.08)',textStyle:{color:'#e2eaf3',fontFamily:'Manrope,sans-serif',fontSize:12}};
const ecLegend={textStyle:{color:'#7a8ba0',fontFamily:'Manrope,sans-serif',fontSize:11},inactiveColor:'rgba(255,255,255,0.15)',itemGap:12};

// ===== Parse month index from label =====
function monthNumFromLabel(label) {
  // "2026-03" -> 3, "24.11" -> 11, "2025-01" -> 1
  const m1 = label.match(/[-.](\d{1,2})$/);
  if (m1) return parseInt(m1[1]);
  return 0;
}

// ===== Find default month index based on today =====
function getDefaultMonthIdx(months) {
  // Find the month matching this month, or closest previous
  let best = -1;
  for (let i = 0; i < months.length; i++) {
    const mn = monthNumFromLabel(months[i].label);
    if (mn <= THIS_MONTH) best = i;
  }
  // If current year doesn't match, find last with data
  if (best < 0 && months.length) best = months.length - 1;
  return best;
}

// ===== Split Sections =====
function splitSections(year){
  const data=rawSheets[year]; if(!data)return;
  let headerRow=-1, monthStart=-1;
  for(let r=0;r<Math.min(5,data.length);r++){for(let c=3;c<data[r].length;c++){const v=(data[r][c]||'').trim();if(/^\d{4}-\d{2}$/.test(v)||/^\d{2}\.\d{1,2}/.test(v)){headerRow=r;monthStart=c;break;}}if(headerRow>=0)break;}
  if(headerRow<0){headerRow=1;monthStart=4;}
  const months=[];
  for(let c=monthStart;c<data[headerRow].length;c++){const v=(data[headerRow][c]||'').trim();if(v&&!v.startsWith('*'))months.push({col:c,label:v});}

  let mode='',incRows=[],savRows=[],expRows=[],astRows=[];
  for(let r=0;r<data.length;r++){
    const c1=(data[r][1]||'').trim(), joined=data[r].join('').trim();
    if(!joined){mode='';continue;}
    if(c1.includes('급여')||c1==='순애 (90%)'||c1==='장훈 (90%)'||c1==='금융소득'||c1==='배당소득'||c1==='기타소득'||c1==='기타'){if(mode!=='savings'&&mode!=='expense'&&mode!=='asset')mode='income';}
    if(c1==='저축'||(c1==='비상금'&&mode!=='expense'))mode='savings';
    if(c1==='지출'||c1==='고정지출'||c1==='변동지출')mode='expense';
    if(c1.includes('자산')||c1==='부동산'||c1==='대출'||c1==='유동자산계')mode='asset';
    const isT=(c1==='합계'||c1==='계');
    if(mode==='income'){incRows.push(r);if(isT)mode='';}
    else if(mode==='savings'){savRows.push(r);if(isT)mode='';}
    else if(mode==='expense'){expRows.push(r);if(isT||c1.includes('잔액')||c1==='저축합계'||c1==='지출합계'){}}
    else if(mode==='asset'){astRows.push(r);}
    else{if(c1==='저축합계'||c1==='지출합계')expRows.push(r);}
  }
  const extract=(rows)=>{if(!rows.length)return[];const res=[data[headerRow]];rows.forEach(r=>res.push(data[r]));return res;};
  const getTotal=(rows)=>{for(let i=rows.length-1;i>=0;i--){const c1=(data[rows[i]][1]||'').trim();if(c1==='합계'||c1==='계')return data[rows[i]];}return null;};

  // Parse asset items for pie chart (individual + grouped)
  const assetItems = [];
  const assetGroupMap = {};
  astRows.forEach(r => {
    const c1 = (data[r][1]||'').trim();
    const c2 = (data[r][2]||'').trim();
    const c3 = (data[r][3]||'').trim();
    // Skip total/subtotal/empty/percentage rows
    if (c1==='계'||c1==='유동자산계'||!c1||c1.includes('자산')) return;
    if (c2.startsWith('▲')||c2.startsWith('▼')) return;
    // Get latest value
    let val = 0;
    for (let i=months.length-1;i>=0;i--) {
      const v = parseNum(data[r][months[i].col]);
      if (v) { val = v; break; }
    }
    if (val !== 0) {
      assetItems.push({ name: c1 + (c2 ? ' ' + c2 : ''), owner: c3, value: val, category: c1 });
      // 대출은 상세항목(c2)으로 구분, 나머지는 통장분류(c1)로 그룹
      const groupKey = c1 === '대출' ? (c2 || c1) : c1;
      if (!assetGroupMap[groupKey]) assetGroupMap[groupKey] = 0;
      assetGroupMap[groupKey] += val;
    }
  });
  const assetGroups = Object.entries(assetGroupMap).map(([name,value]) => ({name, value}));

  sections[year]={months, monthStart, headerRow,
    income:{rows:incRows, data:extract(incRows), total:getTotal(incRows)},
    savings:{rows:savRows, data:extract(savRows), total:getTotal(savRows)},
    expense:{rows:expRows, data:extract(expRows), total:getTotal(expRows)},
    asset:{rows:astRows, data:extract(astRows), total:null, items:assetItems, groups:assetGroups}
  };
}

// ===== Render =====
function renderYearTabs(){document.getElementById('yearTabs').innerHTML=Object.keys(rawSheets).map(y=>`<button class="year-tab ${y===activeYear?'active':''}" onclick="switchYear('${y}')">${y}</button>`).join('');}
function renderSectionTabs(){
  const tabs=[{id:'dashboard',label:'대시보드',dot:''},{id:'income',label:'소득',dot:'green'},{id:'savings',label:'저축',dot:'blue'},{id:'expense',label:'지출',dot:'amber'},{id:'asset',label:'자산',dot:'pink'}];
  document.getElementById('sectionTabs').innerHTML=tabs.map(t=>`<button class="sec-tab ${t.id===activeSection?'active':''}" onclick="switchSection('${t.id}')">${t.dot?`<span class="dot" style="background:var(--${t.dot})"></span>`:''}${t.label}</button>`).join('');
}
function switchYear(y){activeYear=y;activeSection='dashboard';selectedMonthIdx=-1;renderYearTabs();renderSectionTabs();renderView();}
function switchSection(s){activeSection=s;renderSectionTabs();renderView();}

function renderView(){
  destroyCharts();
  const el=document.getElementById('content');
  if(activeSection==='dashboard')renderDashboard(el);
  else renderSpreadsheet(el,activeSection);
}

// ===== Monthly Summary Generator =====
function generateMonthlySummary(sec, months) {
  const day = TODAY.getDate();
  let curIdx, prevIdx, curLabel, prevLabel;
  const defaultIdx = getDefaultMonthIdx(months);

  // Determine comparison months: >=26 this vs last, <26 last vs prev
  if (day >= 26) {
    curIdx = defaultIdx;
    prevIdx = curIdx - 1;
  } else {
    curIdx = defaultIdx > 0 ? defaultIdx - 1 : defaultIdx;
    prevIdx = curIdx - 1;
  }

  // Check for AI-generated summary (per-month, based on comparison month)
  const yearSummaries = aiSummaries[activeYear];
  if (yearSummaries && curIdx >= 0 && curIdx < months.length) {
    const mn = String(monthNumFromLabel(months[curIdx].label)).padStart(2, '0');
    const aiSum = yearSummaries[mn];
    if (aiSum && aiSum.summary) {
      const trendMap = { up: 'tag-up', down: 'tag-down', neutral: 'tag-neutral' };
      const trendLabel = { up: '개선', down: '주의', neutral: '보합' };
      const cls = trendMap[aiSum.trend] || 'tag-neutral';
      const label = trendLabel[aiSum.trend] || '보합';
      // summary.json already contains HTML markup from the scheduled agent
      return {
        title: `${aiSum.period} AI 브리핑`,
        tag: `<span class="summary-tag ${cls}">${label}</span>`,
        body: aiSum.summary,
        isAI: true,
        date: aiSum.date
      };
    }
  }

  if (prevIdx < 0 || curIdx < 0 || curIdx >= months.length) return null;
  curLabel = months[curIdx].label.replace(/^\d{4}-0?/, '').replace(/^0/, '') + '월';
  prevLabel = months[prevIdx].label.replace(/^\d{4}-0?/, '').replace(/^0/, '') + '월';

  const gv = (total) => total ? parseNum(total[months[curIdx].col]) : 0;
  const gvP = (total) => total ? parseNum(total[months[prevIdx].col]) : 0;

  const incCur = gv(sec.income.total), incPrev = gvP(sec.income.total);
  const savCur = gv(sec.savings.total), savPrev = gvP(sec.savings.total);
  const expCur = gv(sec.expense.total), expPrev = gvP(sec.expense.total);

  // Check if we have enough data
  if (!incCur && !incPrev && !expCur && !expPrev) return null;

  const pct = (cur, prev) => prev ? ((cur - prev) / Math.abs(prev) * 100) : null;
  const incPct = pct(incCur, incPrev);
  const savPct = pct(savCur, savPrev);
  const expPct = pct(expCur, expPrev);
  const balCur = incCur - savCur - expCur;
  const balPrev = incPrev - savPrev - expPrev;

  // Find biggest expense changes (detail rows)
  const data = rawSheets[activeYear];
  const expRows = sec.expense.rows || [];
  const expChanges = [];
  expRows.forEach(r => {
    const c1 = (data[r][1]||'').trim();
    const c2 = (data[r][2]||'').trim();
    if (c1==='계'||c1==='합계'||c1.includes('잔액')||!c1) return;
    const name = c2 || c1;
    const cur = parseNum(data[r][months[curIdx].col]);
    const prev = parseNum(data[r][months[prevIdx].col]);
    if (cur || prev) {
      const diff = cur - prev;
      expChanges.push({ name, cur, prev, diff, pct: prev ? (diff/Math.abs(prev)*100) : (cur ? 100 : 0) });
    }
  });
  expChanges.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  // Find biggest income changes
  const incRows = sec.income.rows || [];
  const incChanges = [];
  incRows.forEach(r => {
    const c1 = (data[r][1]||'').trim();
    const c2 = (data[r][2]||'').trim();
    const c3 = (data[r][3]||'').trim();
    if (c1==='계'||c1==='합계'||!c1) return;
    const name = (c2||c1) + (c3 ? `(${c3})` : '');
    const cur = parseNum(data[r][months[curIdx].col]);
    const prev = parseNum(data[r][months[prevIdx].col]);
    if (cur || prev) {
      const diff = cur - prev;
      incChanges.push({ name, cur, prev, diff });
    }
  });
  incChanges.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  // Build commentary
  const parts = [];
  const titleParts = [];

  // Income analysis
  if (incPct !== null) {
    if (Math.abs(incPct) < 3) {
      parts.push(`소득은 ${fmtWon(incCur)}으로 전월과 비슷한 수준입니다.`);
    } else if (incPct > 0) {
      parts.push(`소득이 <span class="highlight">${fmtWon(incCur)}</span>으로 전월 대비 <span class="highlight">+${incPct.toFixed(0)}%</span> 증가했습니다.`);
      if (incChanges.length && incChanges[0].diff > 0) {
        parts.push(`${incChanges[0].name}이(가) ${fmtWon(Math.abs(incChanges[0].diff))} 늘어난 것이 주요 요인입니다.`);
      }
    } else {
      parts.push(`소득이 <span class="down">${fmtWon(incCur)}</span>으로 전월 대비 <span class="down">${incPct.toFixed(0)}%</span> 감소했습니다.`);
      if (incChanges.length && incChanges[0].diff < 0) {
        parts.push(`${incChanges[0].name}이(가) ${fmtWon(Math.abs(incChanges[0].diff))} 줄었습니다.`);
      }
    }
  }

  // Expense analysis
  if (expPct !== null) {
    const expIncomplete = expChanges.some(e => e.name.includes('생활비') && e.cur === 0 && e.prev > 0)
                       || expChanges.some(e => e.name.includes('기타') && e.cur === 0 && e.prev > 0);

    if (expIncomplete && day >= 26) {
      parts.push(`지출은 <span class="warn">${fmtWon(expCur)}</span>인데, 아직 미입력 항목(생활비/기타)이 있어 실제 지출은 더 높을 수 있습니다.`);
    } else if (expPct < -10) {
      parts.push(`지출이 <span class="highlight">${fmtWon(expCur)}</span>으로 전월 대비 <span class="highlight">${expPct.toFixed(0)}%</span> 크게 줄었습니다.`);
    } else if (expPct > 10) {
      parts.push(`지출이 <span class="down">${fmtWon(expCur)}</span>으로 전월 대비 <span class="down">+${expPct.toFixed(0)}%</span> 증가했습니다.`);
    } else {
      parts.push(`지출은 ${fmtWon(expCur)}으로 전월과 유사합니다.`);
    }

    // Top expense changes
    const topExp = expChanges.filter(e => Math.abs(e.diff) > 50000).slice(0, 3);
    if (topExp.length) {
      const items = topExp.map(e => {
        const dir = e.diff > 0 ? '증가' : '감소';
        const cls = e.diff > 0 ? 'warn' : 'highlight';
        return `<span class="${cls}">${e.name}(${dir} ${fmtWon(Math.abs(e.diff))})</span>`;
      });
      parts.push(`주요 변동: ${items.join(', ')}`);
    }
  }

  // Savings analysis
  if (savPct !== null && (savCur || savPrev)) {
    if (savCur > savPrev) {
      parts.push(`저축은 <span class="highlight">${fmtWon(savCur)}</span>으로 전월보다 늘렸습니다.`);
    } else if (savCur < savPrev) {
      parts.push(`저축은 ${fmtWon(savCur)}으로 전월 대비 소폭 줄었습니다.`);
    } else {
      parts.push(`저축은 ${fmtWon(savCur)}으로 동일합니다.`);
    }
  }

  // Balance verdict
  if (balCur > 0 && balPrev <= 0) {
    parts.push(`급여 대비 잔액이 <span class="highlight">흑자 전환(${fmtWon(balCur)})</span>되어 좋은 흐름입니다.`);
  } else if (balCur <= 0 && balPrev > 0) {
    parts.push(`급여 대비 잔액이 <span class="down">적자 전환(${fmtWon(balCur)})</span>되었습니다. 지출 관리에 유의하세요.`);
  } else if (balCur > 0 && balCur > balPrev) {
    parts.push(`급여 대비 잔액이 ${fmtWon(balCur)}으로 개선되었습니다.`);
  }

  // Title tag
  const overallTrend = (incPct||0) > 0 && (expPct||0) < 0 ? 'up' :
                       (incPct||0) < 0 && (expPct||0) > 0 ? 'down' : 'neutral';
  const tagCls = overallTrend==='up' ? 'tag-up' : overallTrend==='down' ? 'tag-down' : 'tag-neutral';
  const tagText = overallTrend==='up' ? '개선' : overallTrend==='down' ? '주의' : '보합';

  return {
    title: `${prevLabel} → ${curLabel} 비교`,
    tag: `<span class="summary-tag ${tagCls}">${tagText}</span>`,
    body: parts.join(' ')
  };
}

// ===== Dashboard =====
function renderDashboard(container){
  const sec=sections[activeYear];
  if(!sec){container.innerHTML='<p style="color:var(--text-muted)">데이터 없음</p>';return;}
  const months=sec.months;
  const gv=(tr)=>months.map(m=>tr?parseNum(tr[m.col]):0);
  const incV=gv(sec.income.total), savV=gv(sec.savings.total), expV=gv(sec.expense.total);

  // Determine selected month
  if(selectedMonthIdx<0) selectedMonthIdx=getDefaultMonthIdx(months);
  const si=selectedMonthIdx;
  const pi=Math.max(0,si-1);
  const calcChg=(v)=>v[pi]?((v[si]-v[pi])/Math.abs(v[pi])*100):null;
  const chgHtml=(v)=>{if(v===null)return'';const d=v>=0?'up':'down';const a=v>=0?'&#9650;':'&#9660;';return`<div class="card-change ${d}">${a} ${Math.abs(v).toFixed(1)}% vs 전월</div>`;};

  // Asset totals (자산총액, 부채총액, 순자산)
  const assetGroups = sec.asset.groups || [];
  const totalPositive = assetGroups.filter(a=>a.value>0).reduce((s,a)=>s+a.value,0);
  const totalDebt = assetGroups.filter(a=>a.value<0).reduce((s,a)=>s+a.value,0);
  const netAsset = totalPositive + totalDebt;

  // Month pills
  let pillsHtml = months.map((m,i) => {
    const mn = monthNumFromLabel(m.label);
    const hasData = incV[i] || savV[i] || expV[i];
    const cls = i===si ? 'active' : (!hasData ? 'disabled' : '');
    const shortLabel = m.label.replace(/^\d{4}-/,'').replace(/^24\./,'');
    return `<button class="month-pill ${cls}" onclick="selectMonth(${i})">${shortLabel}</button>`;
  }).join('');

  // Asset groups for pie (카테고리별 그룹) - assetGroups already declared above
  const positiveGroups = assetGroups.filter(a => a.value > 0);
  const negativeGroups = assetGroups.filter(a => a.value < 0);

  // Generate monthly summary
  const summary = generateMonthlySummary(sec, months);
  const summaryHtml = summary ? `
  <div class="summary-banner${summary.isAI ? ' is-ai' : ''}">
    <div class="ai-corner"></div>
    <div class="summary-title">
      <span class="ai-badge">AI</span>
      ${summary.tag}${summary.title}${summary.date ? `<span style="margin-left:auto;font-size:10px;color:var(--text-dim);font-weight:500;text-transform:none;letter-spacing:0">${summary.date}</span>` : ''}
    </div>
    <div class="summary-body">${summary.body}</div>
  </div>` : '';

  // Milestone: 10-year retirement goal (15억, 2026-2036)
  const GOAL_START = 2026, GOAL_END = 2036, GOAL_AMOUNT = 1500000000;
  const YEARLY_TARGET = GOAL_AMOUNT / (GOAL_END - GOAL_START); // 1.5억/year
  const currentAssets = totalPositive + totalDebt; // 전체 자산(부동산 포함) - 부채
  const yearsElapsed = THIS_YEAR - GOAL_START + (THIS_MONTH - 1) / 12;
  const expectedNow = Math.min(GOAL_AMOUNT, YEARLY_TARGET * yearsElapsed);
  const goalPct = Math.min(100, (currentAssets / GOAL_AMOUNT * 100));
  const expectedPct = Math.min(100, (expectedNow / GOAL_AMOUNT * 100));
  const gap = currentAssets - expectedNow;

  let milestoneMarkers = '';
  for (let y = GOAL_START; y <= GOAL_END; y++) {
    const targetAtYear = YEARLY_TARGET * (y - GOAL_START);
    const reached = currentAssets >= targetAtYear;
    const isCurrent = y === THIS_YEAR;
    const dotCls = isCurrent ? 'current' : (reached ? 'reached' : '');
    milestoneMarkers += `<div class="milestone-marker"><div class="dot ${dotCls}"></div><div class="yr">${String(y).slice(2)}</div><div class="amt">${fmtWon(targetAtYear)||'0'}</div></div>`;
  }

  const gapText = gap >= 0
    ? `<span style="color:var(--green)">목표 대비 +${fmtWon(gap)} 초과</span>`
    : `<span style="color:var(--red)">목표 대비 ${fmtWon(gap)} 부족</span>`;
  const remainYears = GOAL_END - THIS_YEAR;
  const needPerYear = remainYears > 0 ? (GOAL_AMOUNT - currentAssets) / remainYears : 0;

  const milestoneHtml = currentAssets > 0 ? `
  <div class="milestone-card">
    <div class="milestone-header">
      <h3>은퇴 마일스톤 — 10년 15억 목표</h3>
      <div class="milestone-meta">${GOAL_START}~${GOAL_END} · 연 ${fmtWon(YEARLY_TARGET)} 목표</div>
    </div>
    <div class="milestone-bar-wrap">
      <div class="milestone-bar-fill" style="width:${Math.max(goalPct,1)}%" data-pct="${goalPct.toFixed(1)}%"></div>
    </div>
    <div class="milestone-markers">${milestoneMarkers}</div>
    <div class="milestone-stats">
      <div class="milestone-stat">현재 유동자산: <strong>${fmtWon(currentAssets)}</strong></div>
      <div class="milestone-stat">예상 도달: <strong>${fmtWon(Math.round(expectedNow))}</strong></div>
      <div class="milestone-stat">${gapText}</div>
      <div class="milestone-stat">남은 기간 연 필요: <strong>${fmtWon(Math.round(needPerYear))}</strong></div>
    </div>
  </div>` : '';

  let html = `
  <div class="month-selector">
    <label>기준월</label>
    <div class="month-pills">${pillsHtml}</div>
  </div>

  ${summaryHtml}
  ${milestoneHtml}

  <div class="dash-grid">
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--green-bg);color:var(--green)">&#8593;</span>소득</div>
      <div class="card-value" style="color:var(--green)">${fmtWon(incV[si])}</div>
      ${chgHtml(calcChg(incV))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--blue-bg);color:var(--blue)">&#9776;</span>저축</div>
      <div class="card-value" style="color:var(--blue)">${fmtWon(savV[si])}</div>
      ${chgHtml(calcChg(savV))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--amber-bg);color:var(--amber)">&#8595;</span>지출</div>
      <div class="card-value" style="color:var(--amber)">${fmtWon(expV[si])}</div>
      ${chgHtml(calcChg(expV))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--cyan-bg);color:var(--cyan)">&#9650;</span>자산 총액</div>
      <div class="card-value" style="color:var(--cyan)">${totalPositive?fmtWon(totalPositive):'-'}</div>
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--red-bg);color:var(--red)">&#9660;</span>부채</div>
      <div class="card-value" style="color:var(--red)">${totalDebt?fmtWon(totalDebt):'-'}</div>
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--pink-bg);color:var(--pink)">&#9733;</span>순자산</div>
      <div class="card-value" style="color:var(--pink)">${netAsset?fmtWon(netAsset):'-'}</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3>월별 수입 vs 지출</h3>
      <div id="chIncExp" style="height:260px"></div>
    </div>
    <div class="chart-card">
      <h3>월별 저축 vs 지출</h3>
      <div id="chSav" style="height:260px"></div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3 id="expPieTitle">${months[si] ? months[si].label.replace(/^\d{4}-/,'') : ''}월 지출 구성</h3>
      <div id="chExpPie" style="height:300px"></div>
    </div>
    <div class="chart-card full" style="grid-column:unset">
      <h3>월별 상세 지출 항목</h3>
      <div id="chExpBar" style="height:300px"></div>
    </div>
  </div>

  ${positiveGroups.length ? `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <span style="font-size:13px;color:var(--text-muted);font-weight:500">자산 보기</span>
    <button class="month-pill ${assetViewMode==='group'?'active':''}" onclick="setAssetView('group')">유형별</button>
    <button class="month-pill ${assetViewMode==='detail'?'active':''}" onclick="setAssetView('detail')">전체 상세</button>
  </div>
  <div class="chart-row">
    <div class="chart-card">
      <h3>${assetViewMode==='group'?'자산 유형별 구성':'자산 상세 구성'}</h3>
      <div id="chAssetPie" style="height:300px"></div>
    </div>
    <div class="chart-card">
      <h3>부채</h3>
      <div id="chDebtPie" style="height:300px"></div>
    </div>
  </div>` : ''}

  <div class="chart-card" style="margin-bottom:20px">
    <h3>월별 상세</h3>
    <div class="mtable-wrap">
    <table class="mtable">
      <thead><tr><th>월</th><th class="n">소득</th><th class="n">저축</th><th class="n">지출</th><th class="n">잔액</th></tr></thead>
      <tbody>`;

  const lastData = months.reduce((acc,_,i) => (incV[i]||savV[i]||expV[i]) ? i : acc, 0);
  for(let i=0;i<=lastData;i++){
    const bal=incV[i]-savV[i]-expV[i];
    const hl=i===si?' class="hl"':'';
    html+=`<tr${hl}><td>${months[i].label}</td><td class="n">${fmtNum(incV[i])}</td><td class="n">${fmtNum(savV[i])}</td><td class="n">${fmtNum(expV[i])}</td><td class="n ${bal>=0?'pos':'neg'}">${fmtNum(bal)}</td></tr>`;
  }
  html+=`</tbody></table></div></div>`;
  container.innerHTML=html;

  // Charts (ECharts) — defer to next frame so DOM layout is settled
  const labels=months.slice(0,lastData+1).map(m=>{const s=m.label.replace(/^\d{4}-/,'').replace(/^24\./,'');return s;});
  requestAnimationFrame(()=>{

  // 1. Income vs Expense Bar
  {const el=document.getElementById('chIncExp');
    if(el) initChart(el,{
      tooltip:{...ecTooltip,trigger:'axis',axisPointer:{type:'shadow'},formatter:ps=>ps.map(p=>`<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`).join('<br>')},
      legend:{...ecLegend,top:0,right:0,data:['소득','지출']},
      grid:{left:60,right:16,top:36,bottom:24,containLabel:false},
      xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false},splitLine:{show:false}},
      yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
      series:[
        {name:'소득',type:'bar',data:incV.slice(0,lastData+1),color:'#2dd4bf',barWidth:'35%',itemStyle:{borderRadius:[3,3,0,0]}},
        {name:'지출',type:'bar',data:expV.slice(0,lastData+1),color:'#f59e0b',barWidth:'35%',itemStyle:{borderRadius:[3,3,0,0]}}
      ],
      animationDuration:600,animationEasing:'cubicOut'
    });
  }

  // 2. Savings vs Expense Area
  {const el=document.getElementById('chSav');
    if(el) initChart(el,{
      tooltip:{...ecTooltip,trigger:'axis',formatter:ps=>ps.map(p=>`<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`).join('<br>')},
      legend:{...ecLegend,top:0,right:0,data:['저축','지출']},
      grid:{left:60,right:16,top:36,bottom:24,containLabel:false},
      xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false},splitLine:{show:false},boundaryGap:false},
      yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
      series:[
        {name:'저축',type:'line',data:savV.slice(0,lastData+1),color:'#60a5fa',smooth:true,symbol:'circle',symbolSize:6,lineStyle:{width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(96,165,250,0.25)'},{offset:1,color:'rgba(96,165,250,0.02)'}])}},
        {name:'지출',type:'line',data:expV.slice(0,lastData+1),color:'#f59e0b',smooth:true,symbol:'circle',symbolSize:6,lineStyle:{width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(245,158,11,0.25)'},{offset:1,color:'rgba(245,158,11,0.02)'}])}}
      ],
      animationDuration:600,animationEasing:'cubicOut'
    });
  }

  // Expense Pie & Bar
  {
    const data = rawSheets[activeYear];
    const expRows = sec.expense.rows || [];
    const expItemMap = {};
    expRows.forEach(r => {
      const c1 = (data[r][1]||'').trim();
      const c2 = (data[r][2]||'').trim();
      if (c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
      const name = c2 || c1;
      if (!name) return;
      const val = parseNum(data[r][months[si].col]);
      if (val > 0) expItemMap[name] = (expItemMap[name]||0) + val;
    });
    const expItems = Object.entries(expItemMap).map(([name,val])=>({name,val}));
    const expColors=['#fbbf24','#f87171','#a78bfa','#34d399','#f472b6','#60a5fa','#fb923c','#22d3ee','#4ade80','#e879f9','#38bdf8','#818cf8'];
    // Pie: fallback to most recent month with data if selected month is empty
    let pieItems = expItems;
    let pieLabel = months[si] ? months[si].label.replace(/^\d{4}-/,'')+'월' : '';
    if(pieItems.length < 3){
      for(let fi=lastData;fi>=0;fi--){
        const tmpMap={};
        expRows.forEach(r=>{
          const c1=(data[r][1]||'').trim(),c2=(data[r][2]||'').trim();
          if(c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
          const name=c2||c1; if(!name) return;
          const v=parseNum(data[r][months[fi].col]);
          if(v>0) tmpMap[name]=(tmpMap[name]||0)+v;
        });
        const tmp=Object.entries(tmpMap).map(([name,val])=>({name,val}));
        if(tmp.length){pieItems=tmp;pieLabel=months[fi].label.replace(/^\d{4}-/,'')+'월';break;}
      }
    }
    pieItems.sort((a,b)=>b.val-a.val);
    const pieTotal = pieItems.reduce((s,e)=>s+e.val,0);
    const expPieTitleEl = document.getElementById('expPieTitle');
    if(expPieTitleEl) expPieTitleEl.textContent = pieLabel+' 지출 구성';

    // 3. Expense Donut
    if(pieItems.length){
      const el=document.getElementById('chExpPie');
      if(el) initChart(el,{
        tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
        legend:{...ecLegend,orient:'vertical',right:8,top:'middle',data:pieItems.map(e=>e.name),selectedMode:true},
        series:[{
          type:'pie',radius:['45%','72%'],center:['38%','50%'],
          data:pieItems.map((e,i)=>({name:e.name,value:e.val,itemStyle:{color:expColors[i%expColors.length]}})),
          label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:13,fontWeight:600,fontFamily:'Manrope,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
          labelLine:{show:false},
          itemStyle:{borderColor:'transparent',borderWidth:0},
          animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*60
        }]
      });
    }

    // 4. Monthly Expense Stacked Bar
    const allExpCats = new Set();
    expRows.forEach(r => {
      const c1=(data[r][1]||'').trim(), c2=(data[r][2]||'').trim();
      if(c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
      const name=c2||c1; if(name) allExpCats.add(name);
    });
    if(allExpCats.size){
      const cats = Array.from(allExpCats);
      const expBarSeries = cats.map((cat,ci) => {
        const vals = months.slice(0,lastData+1).map(m => {
          let sum=0;
          for(const r of expRows){
            const c1=(data[r][1]||'').trim(), c2=(data[r][2]||'').trim();
            if((c2||c1)===cat) sum+=parseNum(data[r][m.col]);
          }
          return sum;
        });
        return {name:cat,type:'bar',stack:'exp',data:vals,color:expColors[ci%expColors.length],itemStyle:{borderRadius:ci===cats.length-1?[2,2,0,0]:[0,0,0,0]},barWidth:'55%'};
      });
      const el=document.getElementById('chExpBar');
      if(el) initChart(el,{
        tooltip:{...ecTooltip,trigger:'axis',axisPointer:{type:'shadow'},formatter:ps=>{let t=0;const lines=ps.filter(p=>p.value).map(p=>{t+=p.value;return `<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`;});lines.push(`<b>합계: ${fmtWon(t)}</b>`);return lines.join('<br/>');}},
        legend:{...ecLegend,top:0,type:'scroll',data:cats},
        grid:{left:60,right:16,top:40,bottom:24,containLabel:false},
        xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false}},
        yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
        series:expBarSeries,
        animationDuration:600,animationEasing:'cubicOut'
      });
    }
  }

  // Asset & Debt Donuts (ECharts)
  if(positiveGroups.length){
    const pieColors=['#2dd4bf','#60a5fa','#fbbf24','#f472b6','#a78bfa','#34d399','#fb923c','#4ade80','#818cf8','#f87171','#38bdf8','#e879f9'];
    const assetItems = sec.asset.items || [];
    const positiveItems = assetItems.filter(a => a.value > 0);
    const pieData = assetViewMode==='group' ? positiveGroups : positiveItems;
    const pieTotal2 = pieData.reduce((s,a)=>s+a.value,0);

    // 5. Asset Donut
    {const el=document.getElementById('chAssetPie');
      if(el) initChart(el,{
        tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
        legend:{...ecLegend,bottom:4,type:'scroll',data:pieData.map(a=>a.name),selectedMode:true},
        series:[{
          type:'pie',radius:['42%','70%'],center:['50%','45%'],
          data:pieData.map((a,i)=>({name:a.name,value:a.value,itemStyle:{color:pieColors[i%pieColors.length]}})),
          label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:12,fontWeight:600,fontFamily:'Manrope,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
          labelLine:{show:false},
          itemStyle:{borderColor:'transparent',borderWidth:0},
          animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*50
        }]
      });
    }

    // 6. Debt Donut
    if(negativeGroups.length){
      const negItems = assetItems.filter(a => a.value < 0);
      const debtData = assetViewMode==='group' ? negativeGroups : negItems;
      const debtTotal = debtData.reduce((s,a)=>s+Math.abs(a.value),0);
      const debtColors=['#fb7185','#fb923c','#fbbf24','#f472b6'];
      const el=document.getElementById('chDebtPie');
      if(el) initChart(el,{
        tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
        legend:{...ecLegend,bottom:4,type:'scroll',data:debtData.map(a=>a.name),selectedMode:true},
        series:[{
          type:'pie',radius:['42%','70%'],center:['50%','45%'],
          data:debtData.map((a,i)=>({name:a.name,value:Math.abs(a.value),itemStyle:{color:debtColors[i%debtColors.length]}})),
          label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:12,fontWeight:600,fontFamily:'Manrope,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
          labelLine:{show:false},
          itemStyle:{borderColor:'transparent',borderWidth:0},
          animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*50
        }]
      });
    }
  }

  // Force resize after init to fix canvas dimensions
  setTimeout(()=>{chartInstances.forEach(c=>{try{c.resize();}catch(e){}});},50);
  }); // end requestAnimationFrame
}

function setAssetView(mode){assetViewMode=mode;renderView();}

function selectMonth(i){selectedMonthIdx=i;renderView();}

window.addEventListener('resize',()=>{chartInstances.forEach(c=>{try{c.resize();}catch(e){}});});

// ===== Spreadsheet =====
function renderSpreadsheet(container,key){
  const sec=sections[activeYear];
  if(!sec||!sec[key]){container.innerHTML='<p style="color:var(--text-muted)">데이터 없음</p>';return;}
  const sData=sec[key].data;
  if(!sData.length){container.innerHTML='<p style="color:var(--text-muted)">해당 섹션 데이터가 없습니다.</p>';return;}
  const names={income:'소득',savings:'저축',expense:'지출',asset:'자산'};
  container.innerHTML=`<div class="sheet-toolbar"><button class="btn" onclick="sheetInsertRow()">+ 행 추가</button><button class="btn" onclick="sheetUndo()">&#8617; 되돌리기</button><button class="btn primary" onclick="sheetDownload()">&#128190; CSV 저장</button><span class="sheet-status" id="sheetStatus"></span></div><div id="spreadsheet"></div>`;
  const nc=sData[0].length;
  const cols=[];for(let i=0;i<nc;i++)cols.push({type:'text',width:i===0?30:i<=2?110:i===3?60:95});
  jexcelInstance=jspreadsheet(document.getElementById('spreadsheet'),{
    data:sData.map(r=>[...r]), columns:cols, defaultColWidth:95,
    tableOverflow:true, tableWidth:'100%', tableHeight:(window.innerHeight-280)+'px',
    allowInsertRow:true, allowDeleteRow:true, columnSorting:false,
    contextMenu:(el,x,y)=>[{title:'위에 행 삽입',onclick:()=>jexcelInstance.insertRow(1,y,true)},{title:'아래에 행 삽입',onclick:()=>jexcelInstance.insertRow(1,y,false)},{type:'line'},{title:'행 삭제',onclick:()=>jexcelInstance.deleteRow(y)}],
    onchange:()=>{sec[key].data=jexcelInstance.getData();showSS('수정됨');setTimeout(applyCellStyles,50);},
    oninsertrow:()=>{sec[key].data=jexcelInstance.getData();setTimeout(applyCellStyles,50);},
    ondeleterow:()=>{sec[key].data=jexcelInstance.getData();setTimeout(applyCellStyles,50);}
  });
  setTimeout(applyCellStyles,100);
}

function applyCellStyles(){
  if(!jexcelInstance)return;
  const data=jexcelInstance.getData();
  const numCols=data[0]?data[0].length:0;

  for(let r=0;r<data.length;r++){
    const row=data[r];
    const col1=(row[1]||'').trim();
    const isHeader=r===0; // first row is the header from extract()
    const isTotal=(col1==='합계'||col1==='계'||col1==='저축합계'||col1==='지출합계'||col1.includes('잔액'));

    for(let c=0;c<numCols;c++){
      const td=jexcelInstance.getCell([c,r]);
      if(!td)continue;
      // Clear previous custom classes
      td.classList.remove('cell-header','cell-category','cell-subcategory','cell-owner','cell-total');

      if(isHeader){
        td.classList.add('cell-header');
      } else if(isTotal){
        td.classList.add('cell-total');
      } else {
        // Category columns styling
        if(c===1) td.classList.add('cell-category');
        else if(c===2) td.classList.add('cell-subcategory');
        else if(c===3) td.classList.add('cell-owner');
      }
    }
  }
}
function sheetInsertRow(){if(jexcelInstance)jexcelInstance.insertRow();showSS('행 추가됨');}
function sheetUndo(){if(jexcelInstance)jexcelInstance.undo();showSS('되돌림');}
function sheetDownload(){
  if(!jexcelInstance)return;
  const csv=toCSV(jexcelInstance.getData());
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const n={income:'소득',savings:'저축',expense:'지출',asset:'자산'};
  a.download=`${activeYear}_${n[activeSection]||activeSection}.csv`;a.click();URL.revokeObjectURL(a.href);showSS('CSV 저장됨');
}
function showSS(m){const el=document.getElementById('sheetStatus');if(!el)return;el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

// ===== Init =====
async function init(){
  // Load AI summaries
  try{const r=await fetch('./summary.json?t='+Date.now());if(r.ok)aiSummaries=await r.json();}catch(e){}
  for(const f of['2025','2026']){try{const r=await fetch(`./${f}.csv?t=`+Date.now());if(r.ok){rawSheets[f]=parseCSV(await r.text());splitSections(f);}}catch(e){}}
  if(!Object.keys(rawSheets).length){rawSheets['new']=[Array(20).fill('')];splitSections('new');}
  // Default to year matching today, or latest
  activeYear=rawSheets[String(THIS_YEAR)]?String(THIS_YEAR):Object.keys(rawSheets).pop();
  activeSection='dashboard';
  selectedMonthIdx=-1;
  renderYearTabs();renderSectionTabs();renderView();
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();sheetDownload();}});
if(sessionStorage.getItem('auth')==='1') init();
</script>

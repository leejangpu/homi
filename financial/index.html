<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOMI — Home Automation Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jexcel.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  :root {
    --primary:#38d9c0; --primary-light:#6eecd8;
    --bg:#060a12; --bg-card:rgba(255,255,255,0.028); --bg-hover:rgba(255,255,255,0.055);
    --bg-card-elevated:rgba(255,255,255,0.042);
    --text:#f0f4ff; --text-muted:#8694a8; --text-dim:#4d5f73; --border:rgba(255,255,255,0.07);
    --green:#36dba0; --green-bg:rgba(54,219,160,0.1);
    --red:#f97088; --red-bg:rgba(249,112,136,0.1);
    --blue:#6aadfc; --blue-bg:rgba(106,173,252,0.1);
    --amber:#f7c035; --amber-bg:rgba(247,192,53,0.1);
    --pink:#ef6fb5; --pink-bg:rgba(239,111,181,0.1);
    --cyan:#38d9c0; --cyan-bg:rgba(56,217,192,0.1);
    --gold:#efa20e;
    --radius:14px; --radius-sm:10px; --pad:32px;
    --font-ui:'Plus Jakarta Sans','Noto Sans KR',sans-serif;
    --font-num:'JetBrains Mono','Plus Jakarta Sans',monospace;
    --shadow-card:0 1px 2px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.15);
    --shadow-card-hover:0 4px 12px rgba(0,0,0,0.35), 0 12px 40px rgba(0,0,0,0.2);
    --shadow-glow:0 0 24px rgba(56,217,192,0.12);
    --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
    --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{overflow-x:hidden;}
  .jexcel_content{-webkit-overflow-scrolling:touch!important;}

  body{
    font-family:var(--font-ui);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    background-image:
      radial-gradient(ellipse 90% 50% at 5% -10%, rgba(56,217,192,0.07) 0%, transparent 55%),
      radial-gradient(ellipse 70% 45% at 95% 105%, rgba(239,162,14,0.04) 0%, transparent 55%),
      radial-gradient(ellipse 50% 30% at 50% 50%, rgba(106,173,252,0.02) 0%, transparent 60%);
    background-attachment:fixed;
  }

  /* Subtle grain overlay */
  body::before{
    content:'';
    position:fixed;
    inset:0;
    opacity:0.018;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size:180px 180px;
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  .header{
    background:rgba(6,10,18,0.78);
    backdrop-filter:saturate(180%) blur(24px);
    -webkit-backdrop-filter:saturate(180%) blur(24px);
    padding:12px var(--pad);
    display:flex;
    align-items:center;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    z-index:100;
  }
  .logo{display:flex;align-items:center;gap:14px;}
  .logo-icon{
    width:38px;height:38px;
    background:linear-gradient(135deg,var(--primary) 0%,var(--gold) 100%);
    border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;font-weight:800;
    color:#060a12;
    box-shadow:0 0 20px rgba(56,217,192,0.2), inset 0 1px 0 rgba(255,255,255,0.2);
    transition:transform .3s var(--ease-spring);
  }
  .logo-icon:hover{transform:scale(1.05) rotate(-2deg);}
  .logo h1{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}
  .logo .sub{font-size:10px;color:var(--text-dim);margin-top:2px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;}

  /* ── YEAR TABS ── */
  .year-tabs{
    display:flex;gap:0;
    padding:0 var(--pad);
    background:rgba(6,10,18,0.6);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
  }
  .year-tab{
    padding:13px 32px;
    background:transparent;
    color:var(--text-dim);
    border:none;cursor:pointer;
    font-family:var(--font-num);
    font-size:13px;font-weight:600;
    letter-spacing:.5px;
    position:relative;
    transition:color .25s var(--ease-out-expo);
  }
  .year-tab:hover{color:var(--text-muted);}
  .year-tab.active{color:var(--primary);}
  .year-tab.active::after{
    content:'';position:absolute;
    bottom:-1px;left:12px;right:12px;height:2px;
    background:var(--primary);
    border-radius:2px 2px 0 0;
    box-shadow:0 0 8px rgba(56,217,192,0.4);
  }

  /* ── SECTION TABS ── */
  .section-tabs{
    display:flex;gap:6px;
    padding:12px var(--pad);
    background:transparent;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
  }
  .section-tabs::-webkit-scrollbar{display:none;}
  .sec-tab{
    padding:8px 18px;
    border-radius:var(--radius-sm);
    border:1px solid transparent;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-family:var(--font-ui);
    font-size:12.5px;font-weight:600;
    letter-spacing:.15px;
    transition:all .2s var(--ease-out-expo);
    white-space:nowrap;flex-shrink:0;
  }
  .sec-tab:hover{color:var(--text-muted);background:var(--bg-hover);}
  .sec-tab.active{
    background:rgba(56,217,192,0.1);
    border-color:rgba(56,217,192,0.25);
    color:var(--primary);
    box-shadow:0 0 12px rgba(56,217,192,0.06);
  }
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;box-shadow:0 0 4px currentColor;}

  /* ── CONTENT ── */
  .content{padding:24px var(--pad) 56px;position:relative;z-index:1;}

  /* ── MONTH SELECTOR ── */
  .month-selector{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
  .month-selector label{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
  .month-pills{display:flex;gap:5px;flex-wrap:wrap;}
  .month-pill{
    padding:6px 14px;border-radius:8px;
    border:1px solid transparent;
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    font-family:var(--font-num);
    font-size:11px;font-weight:500;
    transition:all .2s var(--ease-out-expo);
  }
  .month-pill:hover{border-color:rgba(255,255,255,0.1);color:var(--text-muted);background:rgba(255,255,255,0.025);}
  .month-pill.active{
    background:rgba(56,217,192,0.1);
    border-color:rgba(56,217,192,0.3);
    color:var(--primary);
    font-weight:600;
    box-shadow:0 0 10px rgba(56,217,192,0.08);
  }
  .month-pill.disabled{opacity:0.2;pointer-events:none;}

  /* ── DASHBOARD CARDS ── */
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .dash-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px 24px;
    transition:all .3s var(--ease-out-expo);
    position:relative;
    overflow:hidden;
    box-shadow:var(--shadow-card);
  }
  .dash-card::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 10%,rgba(56,217,192,0.25) 50%,transparent 90%);
    opacity:0;transition:opacity .3s;
  }
  .dash-card::after{
    content:'';position:absolute;
    inset:0;
    background:radial-gradient(ellipse 60% 50% at 50% 0%, rgba(56,217,192,0.03), transparent 70%);
    opacity:0;transition:opacity .3s;pointer-events:none;
  }
  .dash-card:hover{
    border-color:rgba(56,217,192,0.18);
    transform:translateY(-2px);
    box-shadow:var(--shadow-card-hover);
  }
  .dash-card:hover::before{opacity:1;}
  .dash-card:hover::after{opacity:1;}
  .card-label{
    font-size:10px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:1px;
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;
    font-weight:700;
  }
  .card-icon{
    width:26px;height:26px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .card-value{
    font-family:var(--font-num);
    font-size:22px;font-weight:700;
    letter-spacing:-.6px;margin-bottom:8px;
    color:var(--text);
  }
  .card-change{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;}
  .card-change.up{color:var(--green);}
  .card-change.down{color:var(--red);}

  /* ── CHARTS ── */
  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
  .chart-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 22px;
    transition:all .25s var(--ease-out-expo);
    box-shadow:var(--shadow-card);
  }
  .chart-card:hover{border-color:rgba(56,217,192,0.12);box-shadow:var(--shadow-card-hover);}
  .chart-card h3{
    font-size:11px;font-weight:700;
    color:var(--text-dim);
    margin-bottom:16px;
    text-transform:uppercase;letter-spacing:.8px;
  }
  .chart-card.full{grid-column:1/-1;}

  /* ── MILESTONE ── */
  .milestone-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px 28px;
    margin-bottom:24px;
    position:relative;overflow:hidden;
    box-shadow:var(--shadow-card);
  }
  .milestone-card::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(56,217,192,0.2) 30%,rgba(239,162,14,0.15) 70%,transparent);
  }
  .milestone-card::after{
    content:'';position:absolute;
    top:-80px;right:-80px;
    width:220px;height:220px;
    background:radial-gradient(circle,rgba(56,217,192,0.03) 0%,transparent 70%);
    pointer-events:none;
  }
  .milestone-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
  .milestone-header h3{font-size:14px;font-weight:800;color:var(--text);margin:0;letter-spacing:-.3px;}
  .milestone-header .milestone-meta{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:.3px;font-family:var(--font-num);}
  .milestone-bar-wrap{
    position:relative;height:28px;
    background:rgba(255,255,255,0.04);
    border-radius:14px;overflow:hidden;
    margin-bottom:18px;
    border:1px solid rgba(255,255,255,0.03);
  }
  .milestone-bar-fill{
    height:100%;border-radius:14px;
    background:linear-gradient(90deg,var(--primary),var(--gold));
    transition:width 1s var(--ease-out-expo);
    position:relative;min-width:32px;
    box-shadow:0 0 20px rgba(56,217,192,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    display:flex;align-items:center;justify-content:flex-end;
  }
  .milestone-bar-fill::after{
    content:attr(data-pct);
    padding-right:12px;
    font-family:var(--font-num);
    font-size:11px;font-weight:700;
    color:#060a12;
    white-space:nowrap;
  }
  .milestone-markers{display:flex;justify-content:space-between;position:relative;padding:0;}
  .milestone-marker{display:flex;flex-direction:column;align-items:center;position:relative;}
  .milestone-marker .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.08);margin-bottom:6px;transition:all .3s;}
  .milestone-marker .dot.reached{background:var(--primary);box-shadow:0 0 6px rgba(56,217,192,0.3);}
  .milestone-marker .dot.current{background:var(--gold);box-shadow:0 0 10px rgba(239,162,14,.5);}
  .milestone-marker .yr{font-size:10px;color:var(--text-dim);font-weight:600;font-family:var(--font-num);}
  .milestone-marker .amt{font-size:9px;color:var(--text-dim);font-weight:500;margin-top:2px;font-family:var(--font-num);}
  .milestone-stats{display:flex;gap:28px;margin-top:18px;flex-wrap:wrap;}
  .milestone-stat{font-size:12px;color:var(--text-dim);}
  .milestone-stat strong{color:var(--text);font-weight:700;font-family:var(--font-num);}

  /* ── SUMMARY BANNER (base — overridden by AI BRIEFING below) ── */
  .summary-banner{
    background:linear-gradient(135deg,rgba(56,217,192,0.05) 0%,rgba(6,10,18,0) 60%),
               rgba(255,255,255,0.025);
    border:1px solid rgba(56,217,192,0.12);
    border-radius:var(--radius);
    padding:22px 26px;
    margin-bottom:24px;
    position:relative;overflow:hidden;
  }
  .summary-banner::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,rgba(56,217,192,0.5),transparent 50%);
  }
  .summary-banner .summary-title{
    font-size:12px;font-weight:800;
    color:var(--primary);
    margin-bottom:12px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    text-transform:uppercase;letter-spacing:.8px;
  }
  .summary-banner .summary-body{font-size:13.5px;color:var(--text);line-height:1.85;font-weight:400;}
  .summary-banner .summary-body .highlight{color:var(--green);font-weight:700;}
  .summary-banner .summary-body .warn{color:var(--amber);font-weight:700;}
  .summary-banner .summary-body .down{color:var(--red);font-weight:700;}
  .summary-banner .summary-tag{
    display:inline-block;padding:3px 9px;
    border-radius:6px;font-size:10px;font-weight:700;
    margin-right:5px;letter-spacing:.3px;
  }
  .summary-banner .tag-up{background:rgba(54,219,160,0.12);color:var(--green);border:1px solid rgba(54,219,160,0.22);}
  .summary-banner .tag-down{background:rgba(249,112,136,0.12);color:var(--red);border:1px solid rgba(249,112,136,0.22);}
  .summary-banner .tag-neutral{background:rgba(134,148,168,0.08);color:var(--text-muted);border:1px solid rgba(134,148,168,0.15);}

  /* ── TABLE ── */
  .mtable{width:100%;border-collapse:collapse;margin-top:14px;}
  .mtable th{
    text-align:left;padding:10px 14px;
    font-size:10px;color:var(--text-dim);
    border-bottom:1px solid var(--border);
    font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  }
  .mtable td{
    padding:11px 14px;font-size:13px;
    border-bottom:1px solid rgba(255,255,255,0.035);
    transition:background .15s;
  }
  .mtable tr:last-child td{border-bottom:none;}
  .mtable tr:hover td{background:rgba(255,255,255,0.02);}
  .mtable .n{text-align:right;font-family:var(--font-num);font-size:12px;font-variant-numeric:tabular-nums;}
  .mtable .pos{color:var(--green);}
  .mtable .neg{color:var(--red);}
  .mtable .hl{background:rgba(56,217,192,0.04);}
  .mtable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}

  /* ── SHEET TOOLBAR ── */
  .sheet-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .btn{
    padding:8px 16px;
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    background:var(--bg-card);
    color:var(--text-muted);
    cursor:pointer;
    font-family:var(--font-ui);
    font-size:12px;font-weight:600;
    transition:all .2s var(--ease-out-expo);
    letter-spacing:.2px;
  }
  .btn:hover{background:var(--bg-hover);color:var(--text);border-color:rgba(56,217,192,0.25);box-shadow:0 0 8px rgba(56,217,192,0.06);}
  .btn.primary{background:var(--primary);color:#060a12;border-color:var(--primary);font-weight:700;box-shadow:0 2px 8px rgba(56,217,192,0.2);}
  .btn.primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(56,217,192,0.25);}
  .sheet-status{margin-left:auto;font-size:11px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s;letter-spacing:.3px;}
  .sheet-status.show{opacity:1;}

  /* ── JSPREADSHEET DARK ── */
  .jexcel_container{background:var(--bg-card)!important;border-radius:var(--radius)!important;overflow:clip!important;border:1px solid var(--border)!important;box-shadow:var(--shadow-card)!important;}
  .jexcel_freeze{border-right:2px solid rgba(56,217,192,0.3)!important;}
  .jexcel{background:rgba(6,10,18,0.85)!important;}
  .jexcel td{background:rgba(10,16,28,0.9)!important;color:var(--text)!important;border-color:rgba(255,255,255,0.04)!important;font-size:13px!important;font-family:var(--font-ui)!important;transition:background .1s!important;}
  .jexcel thead td{background:rgba(6,10,18,0.95)!important;color:var(--text-muted)!important;font-weight:700!important;border-color:rgba(255,255,255,0.05)!important;font-size:11px!important;}
  .jexcel tbody tr td:first-child{background:rgba(6,10,18,0.95)!important;color:var(--text-dim)!important;}
  .jexcel td.highlight{background:rgba(56,217,192,0.06)!important;}
  .jexcel td.selected,.jexcel td.selection{background:rgba(56,217,192,0.1)!important;border:1px solid rgba(56,217,192,0.35)!important;}
  .jexcel>thead>tr>td.selected{background:var(--primary)!important;color:#060a12!important;}
  .jexcel>tbody>tr>td:first-child.selected{background:var(--primary)!important;color:#060a12!important;}
  .jexcel .highlight-left{border-left:2px solid var(--primary)!important;}
  .jexcel .highlight-right{border-right:2px solid var(--primary)!important;}
  .jexcel .highlight-top{border-top:2px solid var(--primary)!important;}
  .jexcel .highlight-bottom{border-bottom:2px solid var(--primary)!important;}
  .jexcel_contextmenu{background:rgba(10,16,28,0.98)!important;border:1px solid var(--border)!important;border-radius:var(--radius-sm)!important;box-shadow:0 16px 48px rgba(0,0,0,.65)!important;backdrop-filter:blur(16px)!important;}
  .jexcel_contextmenu>div{color:var(--text)!important;padding:8px 14px!important;transition:background .1s!important;}
  .jexcel_contextmenu>div:hover{background:var(--bg-hover)!important;}
  .jexcel td.cell-header{background:rgba(56,217,192,0.06)!important;color:var(--primary-light)!important;font-weight:700!important;font-size:12px!important;letter-spacing:.4px;}
  .jexcel td.cell-category{background:rgba(6,10,18,0.85)!important;color:var(--cyan)!important;font-weight:600!important;}
  .jexcel td.cell-subcategory{background:rgba(8,14,24,0.85)!important;color:var(--text)!important;}
  .jexcel td.cell-owner{background:rgba(8,14,24,0.85)!important;color:var(--text-muted)!important;text-align:center!important;font-size:12px!important;}
  .jexcel td.cell-total{background:rgba(56,217,192,0.04)!important;color:var(--primary-light)!important;font-weight:700!important;}
  .jexcel td input, .jexcel td textarea, .jexcel_editor { color: var(--text) !important; background: rgba(10,16,28,0.95) !important; }

  .cell-tooltip{
    position:fixed;z-index:1000;
    background:rgba(12,18,30,0.95);border:1px solid rgba(56,217,192,0.25);
    border-radius:var(--radius-sm);padding:12px 16px;
    font-family:var(--font-ui);font-size:12px;color:var(--text);
    pointer-events:none;
    box-shadow:0 12px 40px rgba(0,0,0,0.55);
    backdrop-filter:blur(16px);
    display:none;
    min-width:130px;
  }
  .cell-tooltip .tt-label{color:var(--text-muted);font-size:11px;margin-bottom:5px;font-weight:500;}
  .cell-tooltip .tt-value{font-family:var(--font-num);font-weight:600;font-size:13px;}
  .cell-tooltip .tt-value.up{color:var(--green);}
  .cell-tooltip .tt-value.down{color:var(--red);}
  .cell-tooltip .tt-value.flat{color:var(--text-dim);}
  .cell-tooltip .tt-divider{height:1px;background:var(--border);margin:8px 0;}

  .gh-modal-overlay{
    position:fixed;inset:0;z-index:2000;
    background:rgba(0,0,0,0.65);
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(8px);
  }
  .gh-modal{
    background:rgba(12,18,30,0.98);border:1px solid var(--border);
    border-radius:var(--radius);padding:36px;max-width:420px;width:90%;
    box-shadow:0 32px 100px rgba(0,0,0,0.65);
    position:relative;overflow:hidden;
  }
  .gh-modal::before{
    content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(56,217,192,0.3),transparent);
  }
  .gh-modal h3{font-size:17px;font-weight:700;margin-bottom:10px;color:var(--text);}
  .gh-modal p{font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:18px;}
  .gh-modal a{color:var(--primary);text-decoration:none;border-bottom:1px solid rgba(56,217,192,0.3);transition:border-color .2s;}
  .gh-modal a:hover{border-color:var(--primary);}
  .gh-modal input{
    width:100%;padding:12px 14px;
    background:rgba(255,255,255,0.05);border:1px solid var(--border);
    border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-num);font-size:13px;
    outline:none;margin-bottom:14px;box-sizing:border-box;
    transition:border-color .2s, box-shadow .2s;
  }
  .gh-modal input:focus{border-color:var(--primary);box-shadow:0 0 12px rgba(56,217,192,0.1);}
  .gh-modal .btn-row{display:flex;gap:10px;justify-content:flex-end;}
  .gh-modal .btn-row button{
    padding:10px 22px;border-radius:var(--radius-sm);border:none;cursor:pointer;
    font-family:var(--font-ui);font-size:13px;font-weight:600;
    transition:all .2s;
  }
  .gh-modal .btn-cancel{background:rgba(255,255,255,0.06);color:var(--text-muted);}
  .gh-modal .btn-cancel:hover{background:rgba(255,255,255,0.1);}
  .gh-modal .btn-save{background:var(--primary);color:#060a12;box-shadow:0 2px 8px rgba(56,217,192,0.2);}
  .gh-modal .btn-save:hover{box-shadow:0 4px 16px rgba(56,217,192,0.3);}
  .gh-connected{color:var(--green);font-size:11px;font-weight:600;margin-left:8px;}

  .filter-bar{display:flex;gap:5px;margin-left:auto;}
  .filter-btn{
    padding:5px 13px;border-radius:7px;border:1px solid var(--border);
    background:transparent;color:var(--text-muted);cursor:pointer;
    font-family:var(--font-ui);font-size:11px;font-weight:600;
    transition:all .2s var(--ease-out-expo);
  }
  .filter-btn:hover{background:var(--bg-hover);color:var(--text);}
  .filter-btn.active{background:rgba(56,217,192,0.1);color:var(--primary);border-color:rgba(56,217,192,0.25);}

  /* Custom scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px;transition:background .2s;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12);}

  /* ── MOBILE ── */
  @media(max-width:768px){
    :root{--pad:18px;}
    .header{padding:10px var(--pad);}
    .logo-icon{width:32px;height:32px;font-size:13px;border-radius:9px;}
    .logo h1{font-size:15px;}
    .year-tab{padding:11px 20px;font-size:12px;}
    .section-tabs{padding:10px var(--pad);gap:5px;}
    .sec-tab{padding:7px 14px;font-size:11px;}
    .content{padding:16px var(--pad) 36px;}
    .dash-grid{grid-template-columns:1fr 1fr;gap:10px;}
    .card-value{font-size:17px;}
    .card-label{font-size:9px;}
    .card-icon{width:22px;height:22px;font-size:10px;}
    .chart-row{grid-template-columns:1fr;gap:12px;}
    .month-pills{gap:4px;}
    .month-pill{padding:5px 10px;font-size:10px;}
    .mtable th,.mtable td{padding:9px 10px;font-size:12px;}
    .milestone-stats{gap:14px;}
    .milestone-marker .yr{font-size:9px;}
    .milestone-marker .amt{font-size:8px;}
    .milestone-bar-wrap{height:10px;}
    .milestone-card{padding:18px 20px;}
  }
  @media(max-width:400px){
    .dash-grid{grid-template-columns:1fr;gap:8px;}
    .card-value{font-size:20px;}
  }

  /* ── DRAWER ── */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:none;backdrop-filter:blur(4px);}
  .drawer-overlay.open{display:block;}
  .drawer{
    position:fixed;left:0;top:0;bottom:0;width:272px;
    background:rgba(8,13,24,0.97);
    border-right:1px solid var(--border);
    z-index:1001;
    transform:translateX(-100%);
    transition:transform .35s var(--ease-out-expo);
    display:flex;flex-direction:column;
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
  }
  .drawer.open{transform:translateX(0);}
  .drawer-header{
    padding:22px 24px 18px;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:14px;
  }
  .drawer-logo{
    width:34px;height:34px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#060a12;
    box-shadow:0 0 18px rgba(56,217,192,0.18);
    flex-shrink:0;
  }
  .drawer-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
  .drawer-sub{font-size:10px;color:var(--text-dim);margin-top:2px;letter-spacing:.5px;font-weight:600;}
  .drawer-nav{padding:14px 14px;flex:1;}
  .drawer-item{
    display:flex;align-items:center;gap:14px;
    padding:14px 16px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    color:var(--text-muted);
    font-size:14px;font-weight:600;
    transition:all .2s var(--ease-out-expo);
    margin-bottom:4px;
    border:1px solid transparent;
  }
  .drawer-item:hover{background:var(--bg-hover);color:var(--text);}
  .drawer-item.active{
    background:rgba(56,217,192,0.08);
    border-color:rgba(56,217,192,0.18);
    color:var(--primary);
  }
  .drawer-item-icon{font-size:18px;width:28px;text-align:center;}
  .drawer-footer{
    padding:18px 24px;
    border-top:1px solid var(--border);
    font-size:10px;color:var(--text-dim);
    letter-spacing:.4px;font-weight:500;
  }
  /* Hamburger button */
  .hamburger-btn{
    width:38px;height:38px;
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    background:transparent;
    color:var(--text-muted);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    transition:all .2s var(--ease-out-expo);
    margin-right:14px;
    flex-shrink:0;
  }
  .hamburger-btn:hover{background:var(--bg-hover);color:var(--text);border-color:rgba(56,217,192,0.25);box-shadow:0 0 10px rgba(56,217,192,0.06);}

  /* App containers */
  #lotto-app,#infinite-buy-app,#vr-calc-app{padding:24px var(--pad) 56px;position:relative;z-index:1;}

  /* ── LOTTO ── */
  .lotto-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
  .lotto-round-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 22px;
    margin-bottom:14px;
    transition:all .25s var(--ease-out-expo);
    box-shadow:var(--shadow-card);
  }
  .lotto-round-card:hover{border-color:rgba(56,217,192,0.15);transform:translateY(-2px);box-shadow:var(--shadow-card-hover);}
  .lotto-round-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:16px;
    flex-wrap:wrap;gap:10px;
  }
  .lotto-round-title{font-size:16px;font-weight:700;color:var(--text);}
  .lotto-round-badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 12px;border-radius:7px;
    font-size:12px;font-weight:700;
  }
  .lotto-round-badge.win{background:rgba(54,219,160,0.12);color:var(--green);border:1px solid rgba(54,219,160,0.22);}
  .lotto-round-badge.lose{background:rgba(134,148,168,0.06);color:var(--text-dim);border:1px solid var(--border);}
  .lotto-round-badge.pending{background:rgba(247,192,53,0.1);color:var(--amber);border:1px solid rgba(247,192,53,0.2);}
  .lotto-winnings{font-size:13px;color:var(--green);font-weight:600;margin-bottom:14px;}
  .lotto-tickets{display:flex;flex-direction:column;gap:10px;}
  .lotto-ticket{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .lotto-ball{
    width:32px;height:32px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
    flex-shrink:0;
    box-shadow:0 2px 6px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
    transition:transform .15s var(--ease-spring);
  }
  .lotto-ball:hover{transform:scale(1.15);}
  .lotto-ball.y{background:linear-gradient(145deg,#ffd426,#e5b000);color:#3d2e00;}
  .lotto-ball.b{background:linear-gradient(145deg,#4a8ef5,#1a5ec8);color:#fff;}
  .lotto-ball.r{background:linear-gradient(145deg,#f56565,#c53030);color:#fff;}
  .lotto-ball.g{background:linear-gradient(145deg,#8a8a8a,#5a5a5a);color:#fff;}
  .lotto-ball.gr{background:linear-gradient(145deg,#38c77c,#1a8a55);color:#fff;}

  /* ── INFINITE BUY ── */
  .ib-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .ib-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:24px 26px;
    transition:all .25s var(--ease-out-expo);
    position:relative;overflow:hidden;
    box-shadow:var(--shadow-card);
  }
  .ib-card:hover{border-color:rgba(56,217,192,0.15);box-shadow:var(--shadow-card-hover);}
  .ib-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .ib-ticker{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
  .ib-phase-badge{
    padding:5px 12px;border-radius:7px;
    font-size:11px;font-weight:700;letter-spacing:.3px;
  }
  .ib-phase-badge.first{background:rgba(54,219,160,0.1);color:var(--green);border:1px solid rgba(54,219,160,0.22);}
  .ib-phase-badge.second{background:rgba(247,192,53,0.1);color:var(--amber);border:1px solid rgba(247,192,53,0.22);}
  .ib-phase-badge.quarter{background:rgba(249,112,136,0.1);color:var(--red);border:1px solid rgba(249,112,136,0.22);}
  .ib-progress-wrap{
    position:relative;height:8px;
    background:rgba(255,255,255,0.05);
    border-radius:4px;overflow:hidden;
    margin:6px 0 4px;
  }
  .ib-progress-fill{height:100%;border-radius:4px;transition:width .7s var(--ease-out-expo);}
  .ib-progress-fill.first{background:linear-gradient(90deg,#36dba0,#38d9c0);}
  .ib-progress-fill.second{background:linear-gradient(90deg,#f7c035,#efa20e);}
  .ib-progress-fill.quarter{background:linear-gradient(90deg,#f97088,#ef4060);}
  .ib-progress-fill.invest{background:linear-gradient(90deg,var(--primary),var(--gold));}
  .ib-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ib-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .ib-value{font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--text);}
  .ib-value.pos{color:var(--green);}
  .ib-value.neg{color:var(--red);}
  .ib-divider{height:1px;background:var(--border);margin:16px 0;}
  .ib-star{font-size:15px;font-weight:700;color:var(--amber);}
  .ib-price-row{
    display:grid;grid-template-columns:1fr 1fr;gap:12px;
    margin-bottom:14px;
  }
  .ib-price-item{background:rgba(255,255,255,0.025);border-radius:var(--radius-sm);padding:12px 14px;border:1px solid rgba(255,255,255,0.03);}
  .ib-price-item .ib-label{margin-bottom:5px;}
  .ib-price-item .ib-value{font-size:14px;}

  @media(max-width:768px){
    .lotto-stats{grid-template-columns:1fr;}
    .ib-grid{grid-template-columns:1fr;}
    #lotto-app,#infinite-buy-app,#vr-calc-app{padding:16px var(--pad) 36px;}
  }
  @media(max-width:480px){
    .lotto-stats{grid-template-columns:repeat(3,1fr);}
  }

  /* ── VR CALCULATOR ── */
  #vr-calc-app{padding:24px var(--pad) 56px;position:relative;z-index:1;}
  .vr-input-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .vr-field{display:flex;flex-direction:column;gap:5px;}
  .vr-field label{font-size:11px;color:var(--text-dim);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
  .vr-field input{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    border-radius:var(--radius-sm);
    padding:10px 14px;
    color:var(--text);
    font-family:var(--font-num);
    font-size:14px;font-weight:500;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .vr-field input:focus{border-color:rgba(56,217,192,0.4);box-shadow:0 0 12px rgba(56,217,192,0.1);}
  .vr-field input::placeholder{color:var(--text-dim);font-size:12px;}
  .vr-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
  .vr-summary-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:20px 22px;
    box-shadow:var(--shadow-card);
    transition:all .25s var(--ease-out-expo);
  }
  .vr-summary-card:hover{border-color:rgba(56,217,192,0.15);box-shadow:var(--shadow-card-hover);}
  .vr-card-label{font-size:11px;color:var(--text-muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .vr-card-value{font-family:var(--font-num);font-size:20px;font-weight:700;color:var(--text);}
  .vr-card-sub{font-family:var(--font-num);font-size:12px;color:var(--text-muted);margin-top:4px;}
  .vr-detail-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px 24px;
    margin-bottom:24px;
    box-shadow:var(--shadow-card);
  }
  .vr-detail-title{font-size:12px;font-weight:700;color:var(--text-dim);letter-spacing:.6px;text-transform:uppercase;margin-bottom:16px;}
  .vr-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
  .vr-detail-row:last-child{border-bottom:none;}
  .vr-detail-label{font-size:13px;color:var(--text-muted);font-weight:500;}
  .vr-detail-value{font-family:var(--font-num);font-size:14px;font-weight:600;color:var(--text);}
  .vr-order-wrap{
    display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;
  }
  .vr-order-card{
    background:var(--bg-card);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:22px 24px;
    box-shadow:var(--shadow-card);
    max-height:420px;overflow-y:auto;
  }
  .vr-order-card::-webkit-scrollbar{width:4px;}
  .vr-order-card::-webkit-scrollbar-track{background:transparent;}
  .vr-order-card::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
  .vr-order-title{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:14px;}
  .vr-order-title.buy{color:var(--green);}
  .vr-order-title.sell{color:var(--red);}
  .vr-order-title.hold{color:var(--text-muted);}
  .vr-order-table{width:100%;border-collapse:collapse;}
  .vr-order-table th{
    font-size:10px;color:var(--text-dim);font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);
  }
  .vr-order-table th:first-child{text-align:center;width:36px;}
  .vr-order-table td{
    font-family:var(--font-num);font-size:12px;font-weight:500;color:var(--text);
    text-align:right;padding:7px 8px;border-bottom:1px solid rgba(255,255,255,0.025);
  }
  .vr-order-table td:first-child{text-align:center;color:var(--text-dim);}
  .vr-order-table tr.total-row td{
    font-weight:700;border-top:1px solid var(--border);border-bottom:none;
    padding-top:10px;
  }
  .vr-signal{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 16px;border-radius:8px;
    font-size:14px;font-weight:700;
  }
  .vr-signal.buy{background:rgba(54,219,160,0.12);color:var(--green);border:1px solid rgba(54,219,160,0.22);}
  .vr-signal.sell{background:rgba(249,112,136,0.12);color:var(--red);border:1px solid rgba(249,112,136,0.22);}
  .vr-signal.hold{background:rgba(134,148,168,0.08);color:var(--text-muted);border:1px solid var(--border);}
  .vr-btn{
    display:block;width:100%;
    padding:14px 24px;
    background:linear-gradient(135deg,var(--primary),#2ab8a2);
    border:none;border-radius:var(--radius-sm);
    color:#060a12;font-family:var(--font-ui);
    font-size:14px;font-weight:700;letter-spacing:.3px;
    cursor:pointer;
    transition:all .2s var(--ease-out-expo);
    box-shadow:0 2px 12px rgba(56,217,192,0.25);
  }
  .vr-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(56,217,192,0.35);}
  .vr-btn:active{transform:translateY(0);}
  .vr-toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--primary);color:#060a12;
    padding:12px 28px;border-radius:var(--radius-sm);
    font-weight:700;font-size:13px;
    box-shadow:0 4px 20px rgba(56,217,192,0.3);
    transition:transform .3s var(--ease-spring);
    z-index:9000;
  }
  .vr-toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:768px){
    .vr-input-grid{grid-template-columns:repeat(2,1fr);}
    .vr-summary-grid{grid-template-columns:1fr;}
    .vr-order-wrap{grid-template-columns:1fr;}
    #vr-calc-app{padding:16px var(--pad) 36px;}
  }
  @media(max-width:400px){
    .vr-input-grid{grid-template-columns:1fr;}
  }

  /* ── LOCK SCREEN ── */
  #lockScreen{
    position:fixed;inset:0;
    background:var(--bg);
    display:flex;align-items:center;justify-content:center;
    z-index:9999;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -5%,rgba(56,217,192,0.08) 0%,transparent 55%),
      radial-gradient(ellipse 60% 40% at 80% 110%,rgba(239,162,14,0.06) 0%,transparent 55%),
      radial-gradient(circle at 50% 50%,rgba(106,173,252,0.02) 0%,transparent 50%);
  }
  /* Lock screen floating particles */
  #lockScreen::before{
    content:'';position:absolute;
    width:300px;height:300px;
    top:10%;left:5%;
    background:radial-gradient(circle,rgba(56,217,192,0.04) 0%,transparent 70%);
    border-radius:50%;
    animation:lockFloat 8s ease-in-out infinite;
    pointer-events:none;
  }
  #lockScreen::after{
    content:'';position:absolute;
    width:200px;height:200px;
    bottom:15%;right:10%;
    background:radial-gradient(circle,rgba(239,162,14,0.035) 0%,transparent 70%);
    border-radius:50%;
    animation:lockFloat 10s ease-in-out infinite reverse;
    pointer-events:none;
  }
  @keyframes lockFloat{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-30px) scale(1.15);}
  }
  .lock-box{
    background:rgba(255,255,255,0.025);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:24px;
    padding:52px 44px;
    width:340px;max-width:90vw;
    text-align:center;
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    position:relative;overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.05);
    animation:lockAppear .6s var(--ease-out-expo) both;
  }
  @keyframes lockAppear{from{opacity:0;transform:translateY(20px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .lock-box::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 15%,rgba(56,217,192,0.35) 50%,transparent 85%);
  }
  .lock-icon{font-size:40px;margin-bottom:22px;filter:drop-shadow(0 0 16px rgba(56,217,192,0.25));}
  .lock-box h2{font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px;background:linear-gradient(135deg,var(--text),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .lock-box p{font-size:11px;color:var(--text-dim);margin-bottom:32px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
  .lock-input{
    width:100%;padding:16px 20px;
    background:rgba(255,255,255,0.035);
    border:1px solid rgba(255,255,255,0.07);
    border-radius:12px;
    color:var(--text);
    font-size:24px;text-align:center;
    letter-spacing:12px;outline:none;
    transition:all .25s var(--ease-out-expo);
    font-family:var(--font-num);
  }
  .lock-input:focus{border-color:rgba(56,217,192,0.35);background:rgba(56,217,192,0.03);box-shadow:0 0 20px rgba(56,217,192,0.08);}
  .lock-error{color:var(--red);font-size:11px;margin-top:10px;height:16px;font-weight:600;letter-spacing:.3px;}
  .lock-btn{
    width:100%;margin-top:20px;padding:15px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    border:none;border-radius:12px;
    color:#060a12;font-size:14px;font-weight:800;
    cursor:pointer;
    transition:all .25s var(--ease-out-expo);
    letter-spacing:.6px;text-transform:uppercase;
    font-family:var(--font-ui);
    box-shadow:0 4px 20px rgba(56,217,192,0.2);
    position:relative;overflow:hidden;
  }
  .lock-btn::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.1) 50%,transparent 60%);
    transform:translateX(-100%);
    transition:transform .5s;
  }
  .lock-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(56,217,192,0.25);}
  .lock-btn:hover::after{transform:translateX(100%);}
  .lock-btn:active{transform:translateY(0);}

  /* ── AI BRIEFING ── */
  .summary-banner{
    background:
      linear-gradient(135deg,rgba(56,217,192,0.055) 0%,rgba(6,10,18,0.95) 60%),
      rgba(255,255,255,0.02);
    border:1px solid rgba(56,217,192,0.16);
    border-radius:var(--radius);
    padding:24px 28px;
    margin-bottom:24px;
    position:relative;overflow:hidden;
    box-shadow:var(--shadow-card), 0 0 40px rgba(56,217,192,0.03);
  }
  /* Top glow line */
  .summary-banner::before{
    content:'';position:absolute;
    top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent 5%,rgba(56,217,192,0.7) 25%,rgba(239,162,14,0.5) 65%,transparent 95%);
  }
  /* Scanning animation */
  .summary-banner::after{
    content:'';position:absolute;
    top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(56,217,192,0.035),transparent);
    animation:aiScan 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes aiScan{0%{left:-60%;opacity:0}10%{opacity:1}90%{opacity:1}100%{left:160%;opacity:0}}
  /* Corner accent */
  .summary-banner .ai-corner{
    position:absolute;top:0;right:0;
    width:100px;height:100px;
    background:radial-gradient(circle at top right,rgba(56,217,192,0.06),transparent 70%);
    pointer-events:none;
  }
  .summary-banner .summary-title{
    font-size:11px;font-weight:800;
    color:var(--primary);
    margin-bottom:14px;
    display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    text-transform:uppercase;letter-spacing:1px;
  }
  .ai-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:linear-gradient(135deg,var(--primary),var(--gold));
    color:#060a12;font-size:9px;font-weight:900;
    padding:4px 9px;border-radius:5px;letter-spacing:1.8px;
    box-shadow:0 2px 8px rgba(56,217,192,0.2);
  }
  .ai-badge::before{
    content:'';display:inline-block;
    width:5px;height:5px;border-radius:50%;
    background:#060a12;
    animation:aiPulse 2s ease-in-out infinite;
  }
  @keyframes aiPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.6);}}
  .summary-banner .summary-body{
    font-size:13.5px;color:rgba(240,244,255,0.88);
    line-height:1.85;font-weight:400;
    position:relative;z-index:1;
  }
  .summary-banner .summary-body .highlight{color:var(--green);font-weight:700;}
  .summary-banner .summary-body .warn{color:var(--amber);font-weight:700;}
  .summary-banner .summary-body .down{color:var(--red);font-weight:700;}
  .summary-banner .summary-body .up-color{color:#6aadfc;font-weight:600;}
  .summary-banner .summary-body .down-color{color:#f97088;font-weight:600;}
  .summary-banner .summary-tag{
    display:inline-block;padding:3px 10px;
    border-radius:6px;font-size:10px;font-weight:700;
    margin-right:5px;letter-spacing:.4px;
    vertical-align:middle;
  }
  .summary-banner .tag-up{background:rgba(54,219,160,0.12);color:var(--green);border:1px solid rgba(54,219,160,0.22);}
  .summary-banner .tag-down{background:rgba(249,112,136,0.12);color:var(--red);border:1px solid rgba(249,112,136,0.22);}
  .summary-banner .tag-neutral{background:rgba(134,148,168,0.08);color:var(--text-muted);border:1px solid rgba(134,148,168,0.13);}
  /* Typewriter reveal for AI body */
  .summary-banner.is-ai .summary-body{animation:fadeIn .7s var(--ease-out-expo) .15s both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  /* ── ANIMATIONS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .content{animation:fadeUp .4s var(--ease-out-expo);}
  .dash-card{animation:fadeUp .4s var(--ease-out-expo) both;}
  .dash-card:nth-child(1){animation-delay:.03s;}
  .dash-card:nth-child(2){animation-delay:.06s;}
  .dash-card:nth-child(3){animation-delay:.09s;}
  .dash-card:nth-child(4){animation-delay:.12s;}
  .dash-card:nth-child(5){animation-delay:.15s;}
  .dash-card:nth-child(6){animation-delay:.18s;}

  @media(max-width:768px){
    .summary-banner{padding:18px 20px;}
    .summary-banner .summary-body{font-size:12.5px;line-height:1.75;}
  }
</style>
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🏠</div>
    <h2>HOMI</h2>
    <p>Home Automation Dashboard</p>
    <input class="lock-input" id="pwInput" type="password" maxlength="10" placeholder="••••" autofocus
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="lock-error" id="pwError"></div>
    <button class="lock-btn" onclick="checkPw()">확인</button>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-logo">H</div>
    <div>
      <div class="drawer-title">HOMI</div>
      <div class="drawer-sub">HOME AUTOMATION</div>
    </div>
  </div>
  <div class="drawer-nav">
    <div class="drawer-item active" id="nav-financial" onclick="switchApp('financial')">
      <span class="drawer-item-icon">📊</span>가계부
    </div>
    <div class="drawer-item" id="nav-lotto" onclick="switchApp('lotto')">
      <span class="drawer-item-icon">🎱</span>로또
    </div>
    <div class="drawer-item" id="nav-infinite-buy" onclick="switchApp('infinite-buy')">
      <span class="drawer-item-icon">📈</span>무한매수법
    </div>
    <div class="drawer-item" id="nav-vr-calc" onclick="switchApp('vr-calc')">
      <span class="drawer-item-icon">⚖️</span>VR 계산기
    </div>
  </div>
  <div class="drawer-footer">HOMI · Home Automation</div>
</div>

<div id="appWrap" style="display:none">
<div class="header">
  <button class="hamburger-btn" onclick="openDrawer()" title="메뉴">☰</button>
  <div class="logo">
    <div class="logo-icon">H</div>
    <div><h1>HOMI</h1><div class="sub">HOME AUTOMATION</div></div>
  </div>
</div>

<!-- 가계부 앱 -->
<div id="financial-app">
  <div class="year-tabs" id="yearTabs"></div>
  <div class="section-tabs" id="sectionTabs"></div>
  <div class="cell-tooltip" id="cellTooltip"></div>
  <div class="content" id="content"></div>
</div>

<!-- 로또 앱 -->
<div id="lotto-app" style="display:none"></div>

<!-- 무한매수법 앱 -->
<div id="infinite-buy-app" style="display:none"></div>

<!-- VR 계산기 앱 -->
<div id="vr-calc-app" style="display:none"></div>

</div><!-- /appWrap -->

<script src="https://cdn.jsdelivr.net/npm/jsuites@5/dist/jsuites.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4/dist/jexcel.min.js"></script>
<script>
// ===== Auth =====
const PW_HASH = '5e88489b5e88489b'; // internal marker
function checkPw(){
  const v = document.getElementById('pwInput').value;
  if(v === '0907'){
    sessionStorage.setItem('auth','1');
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('appWrap').style.display='';
    init();
  } else {
    const el = document.getElementById('pwError');
    el.textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>el.textContent='', 2000);
  }
}
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('lockScreen').style.display='none';
  document.getElementById('appWrap').style.display='';
}

// ===== Drawer & App State =====
let activeApp = 'financial'; // 'financial' | 'lotto' | 'infinite-buy'

function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
}

function switchApp(app){
  activeApp = app;
  closeDrawer();
  // Update nav active state
  ['financial','lotto','infinite-buy','vr-calc'].forEach(a=>{
    const el = document.getElementById('nav-'+a);
    if(el) el.classList.toggle('active', a===app);
  });
  // Show/hide app containers
  document.getElementById('financial-app').style.display = app==='financial' ? '' : 'none';
  document.getElementById('lotto-app').style.display = app==='lotto' ? '' : 'none';
  document.getElementById('infinite-buy-app').style.display = app==='infinite-buy' ? '' : 'none';
  document.getElementById('vr-calc-app').style.display = app==='vr-calc' ? '' : 'none';
  // Render the selected app
  if(app==='lotto') renderLotto();
  else if(app==='infinite-buy') renderInfiniteBuy();
  else if(app==='vr-calc') renderVRCalc();
}

// ===== Lotto Render =====
function lottoColor(n){
  if(n<=10) return 'y';
  if(n<=20) return 'b';
  if(n<=30) return 'r';
  if(n<=40) return 'g';
  return 'gr';
}
function lottoBall(n){
  return `<span class="lotto-ball ${lottoColor(n)}">${n}</span>`;
}

async function renderLotto(){
  const container = document.getElementById('lotto-app');
  container.innerHTML = '<p style="color:var(--text-muted);padding:20px">로또 데이터 불러오는 중...</p>';
  try{
    const res = await fetch('../lotto/history.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const purchases = (data.purchases||[]).slice().reverse(); // 최신순
    const stats = data.stats || {};
    const totalSpent = stats.totalSpent || purchases.reduce((s,p)=>s+(p.totalAmount||0),0);
    const totalWon = stats.totalWon || purchases.reduce((s,p)=>s+(p.winnings||0),0);
    const roi = totalSpent ? ((totalWon-totalSpent)/totalSpent*100) : 0;
    const roiColor = roi >= 0 ? 'var(--green)' : 'var(--red)';

    let html = `
    <div class="lotto-stats">
      <div class="dash-card">
        <div class="card-label"><span class="card-icon" style="background:var(--red-bg);color:var(--red)">💸</span>총 투자</div>
        <div class="card-value" style="color:var(--text);font-size:18px">${totalSpent.toLocaleString('ko-KR')}원</div>
      </div>
      <div class="dash-card">
        <div class="card-label"><span class="card-icon" style="background:var(--green-bg);color:var(--green)">🏆</span>총 당첨</div>
        <div class="card-value" style="color:var(--green);font-size:18px">${totalWon.toLocaleString('ko-KR')}원</div>
      </div>
      <div class="dash-card">
        <div class="card-label"><span class="card-icon" style="background:var(--amber-bg);color:var(--amber)">📉</span>수익률</div>
        <div class="card-value" style="color:${roiColor};font-size:18px">${roi>=0?'+':''}${roi.toFixed(1)}%</div>
      </div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--text-dim);letter-spacing:.6px;text-transform:uppercase;margin-bottom:12px">구매 이력 (${purchases.length}회)</div>`;

    purchases.forEach(p => {
      const isWin = p.result === '당첨';
      const isPending = !p.result || p.result === '미추첨' || p.result === '';
      let badgeCls = 'lose', badgeIcon = '❌', badgeText = '낙첨';
      if(isWin){ badgeCls='win'; badgeIcon='🎉'; badgeText=p.winDetail||'당첨'; }
      else if(isPending){ badgeCls='pending'; badgeIcon='⏳'; badgeText='미추첨'; }

      const tickets = p.tickets||[];
      const ticketsHtml = tickets.map(t => {
        const nums = (t.numbers||[]).map(lottoBall).join('');
        return `<div class="lotto-ticket">${nums}</div>`;
      }).join('');

      html += `
      <div class="lotto-round-card">
        <div class="lotto-round-header">
          <div class="lotto-round-title">${p.round}회 <span style="font-size:12px;color:var(--text-muted);font-weight:500">${p.buyDate ? '('+p.buyDate+')' : ''}</span></div>
          <div class="lotto-round-badge ${badgeCls}">${badgeIcon} ${badgeText}</div>
        </div>
        ${isWin && p.winnings ? `<div class="lotto-winnings">당첨금: ${p.winnings.toLocaleString('ko-KR')}원</div>` : ''}
        <div class="lotto-tickets">
          ${ticketsHtml || '<span style="color:var(--text-dim);font-size:12px">번호 없음</span>'}
        </div>
      </div>`;
    });

    container.innerHTML = html;
  } catch(e){
    container.innerHTML = `<p style="color:var(--text-muted);padding:20px">로또 데이터를 불러올 수 없습니다.<br><small style="color:var(--text-dim)">${e.message}</small></p>`;
  }
}

// ===== Infinite Buy Render =====
function calcTValue(state){
  if(!state.buyPerRound || state.buyPerRound<=0) return 0;
  const raw = state.totalInvested / state.buyPerRound;
  return Math.min(Math.ceil(raw*100)/100, state.splitCount);
}

function getPhase(state){
  const t = calcTValue(state);
  if(state.quarterMode && state.quarterMode.isActive) return 'QUARTER_MODE';
  if(state.strategyVersion==='v2.2' && (t > state.splitCount-1 || (state.remainingCash!=null && state.remainingCash < state.buyPerRound))){
    return 'QUARTER_MODE';
  }
  return t < state.splitCount/2 ? 'FIRST_HALF' : 'SECOND_HALF';
}

function calcStarPercent(state){
  const t = calcTValue(state);
  return (state.targetProfit||0) - ((state.starDecreaseRate||0)*t);
}

function ibProgressBar(pct, phase){
  const cls = phase==='QUARTER_MODE' ? 'quarter' : phase==='SECOND_HALF' ? 'second' : 'first';
  const w = Math.min(100, Math.max(0, pct));
  return `<div class="ib-progress-wrap"><div class="ib-progress-fill ${cls}" style="width:${w}%"></div></div>`;
}

function ibInvestBar(invested, principal){
  const pct = principal>0 ? Math.min(100,(invested/principal)*100) : 0;
  return `<div class="ib-progress-wrap"><div class="ib-progress-fill invest" style="width:${pct.toFixed(1)}%"></div></div>`;
}

async function renderInfiniteBuy(){
  const container = document.getElementById('infinite-buy-app');
  container.innerHTML = '<p style="color:var(--text-muted);padding:20px">무한매수법 데이터 불러오는 중...</p>';
  try{
    const cfgRes = await fetch('../infinite-buy/config.json?t='+Date.now());
    if(!cfgRes.ok) throw new Error('config 로드 실패');
    const config = await cfgRes.json();
    const tickers = config.tickers || [];
    const states = {};
    for(const ticker of tickers){
      try{
        const r = await fetch(`../infinite-buy/state/${ticker}.json?t=${Date.now()}`);
        if(r.ok) states[ticker] = await r.json();
      }catch(e){}
    }

    if(!Object.keys(states).length){
      container.innerHTML = '<p style="color:var(--text-muted);padding:20px">종목 데이터를 찾을 수 없습니다.</p>';
      return;
    }

    // 사이클 히스토리 로드
    const histories = {};
    for(const ticker of tickers){
      try{
        const histFiles = [];
        for(let c=1;c<=20;c++){
          const fn = `${ticker}-cycle-${String(c).padStart(3,'0')}.json`;
          try{
            const r = await fetch(`../infinite-buy/history/${fn}?t=${Date.now()}`);
            if(r.ok) histFiles.push(await r.json());
          }catch(e){}
        }
        if(histFiles.length) histories[ticker] = histFiles;
      }catch(e){}
    }

    let html = `<div class="ib-grid">`;

    for(const [ticker, state] of Object.entries(states)){
      if(state.status === 'completed') continue; // 완료된 사이클은 아래 히스토리에서 표시
      const t = calcTValue(state);
      const phase = getPhase(state);
      const tPct = state.splitCount > 0 ? (t / state.splitCount)*100 : 0;
      const investPct = state.principal > 0 ? (state.totalInvested / state.principal)*100 : 0;

      const phaseLabel = phase==='QUARTER_MODE' ? '쿼터모드' : phase==='SECOND_HALF' ? '후반전' : '전반전';
      const phaseCls = phase==='QUARTER_MODE' ? 'quarter' : phase==='SECOND_HALF' ? 'second' : 'first';

      const startDate = state.startedAt ? state.startedAt.split('T')[0] : '-';
      const updatedDate = state.updatedAt ? state.updatedAt.split('T')[0] : '-';
      const targetProfitPct = ((state.targetProfit||0)*100).toFixed(0);

      // 미실현 손익 (현재가 기반)
      const curPrice = state.currentPrice || 0;
      const avgPrice = state.avgPrice || 0;
      const qty = state.totalQuantity || 0;
      const hasPrice = curPrice > 0 && qty > 0;
      const pnlRate = hasPrice && avgPrice > 0 ? ((curPrice - avgPrice) / avgPrice * 100) : null;
      const pnlAmt = hasPrice ? (curPrice - avgPrice) * qty : null;

      html += `
      <div class="ib-card">
        <div class="ib-card-header">
          <div class="ib-ticker">${ticker}</div>
          <div class="ib-phase-badge ${phaseCls}">${phaseLabel}</div>
        </div>

        <div class="ib-label" style="margin-bottom:4px">T-value: <strong style="color:var(--text)">${t.toFixed(2)}</strong> / ${state.splitCount}</div>
        ${ibProgressBar(tPct, phase)}
        <div style="text-align:right;font-size:10px;color:var(--text-dim);margin-bottom:14px">${tPct.toFixed(1)}%</div>

        <div class="ib-price-row">
          <div class="ib-price-item">
            <div class="ib-label">평단가</div>
            <div class="ib-value">$${avgPrice ? avgPrice.toFixed(2) : '-'}</div>
          </div>
          <div class="ib-price-item">
            <div class="ib-label">현재가</div>
            <div class="ib-value">${curPrice ? '$'+curPrice.toFixed(2) : '-'}</div>
          </div>
          <div class="ib-price-item">
            <div class="ib-label">수익률</div>
            <div class="ib-value ${pnlRate!==null?(pnlRate>=0?'pos':'neg'):''}">${pnlRate!==null ? (pnlRate>=0?'+':'')+pnlRate.toFixed(2)+'%' : '-'}</div>
          </div>
        </div>

        <div class="ib-divider"></div>

        <div class="ib-price-row">
          <div class="ib-price-item">
            <div class="ib-label">보유수량</div>
            <div class="ib-value">${qty}주</div>
          </div>
          <div class="ib-price-item">
            <div class="ib-label">투자금</div>
            <div class="ib-value">$${(state.totalInvested||0).toFixed(0)}</div>
          </div>
          <div class="ib-price-item">
            <div class="ib-label">목표수익률</div>
            <div class="ib-value">${targetProfitPct}%</div>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:8px">
          <span>사이클 #${state.cycleNumber||1}</span>
          <span>${startDate} ~ ${updatedDate}</span>
        </div>
      </div>`;
    }

    html += `</div>`;

    // 사이클 히스토리
    const allHist = Object.entries(histories).flatMap(([t,arr])=>arr.map(h=>({...h,ticker:h.ticker||t})));
    if(allHist.length){
      allHist.sort((a,b)=>(b.completedAt||'').localeCompare(a.completedAt||''));

      html += `<div style="display:flex;flex-direction:column;gap:8px">`;
      for(const h of allHist){
        const rate = ((h.finalProfitRate||0)*100).toFixed(1);
        const profit = h.totalRealizedProfit||0;
        const cls = profit >= 0 ? 'pos' : 'neg';
        html += `<div class="ib-card" style="padding:12px 16px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <strong>${h.ticker}</strong> <span style="color:var(--text-dim);font-size:12px">사이클 #${h.cycleNumber}</span>
            </div>
            <div class="ib-value ${cls}" style="font-size:14px">${profit>=0?'+':''}$${profit.toFixed(2)} (${profit>=0?'+':''}${rate}%)</div>
          </div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">
            ${(h.startedAt||'').split('T')[0]} ~ ${(h.completedAt||'').split('T')[0]} · 원금 $${(h.principal||0).toLocaleString()}
          </div>
        </div>`;
      }
      html += `</div>`;
    }

    container.innerHTML = html;
  } catch(e){
    container.innerHTML = `<p style="color:var(--text-muted);padding:20px">무한매수법 데이터를 불러올 수 없습니다.<br><small style="color:var(--text-dim)">${e.message}</small></p>`;
  }
}

// ===== Utils =====
function parseCSV(t){const rows=[];let c='',q=false,row=[];for(let i=0;i<t.length;i++){const ch=t[i];if(q){if(ch==='"'&&t[i+1]==='"'){c+='"';i++;}else if(ch==='"')q=false;else c+=ch;}else{if(ch==='"')q=true;else if(ch===','){row.push(c);c='';}else if(ch==='\n'||(ch==='\r'&&t[i+1]==='\n')){row.push(c);c='';rows.push(row);row=[];if(ch==='\r')i++;}else c+=ch;}}if(c||row.length){row.push(c);rows.push(row);}const mx=Math.max(...rows.map(r=>r.length));rows.forEach(r=>{while(r.length<mx)r.push('');});return rows;}
function toCSV(d){return d.map(r=>r.map(c=>{const s=String(c??'');return(s.includes(',')||s.includes('"')||s.includes('\n'))?'"'+s.replace(/"/g,'""')+'"':s;}).join(',')).join('\n');}
function parseNum(s){if(!s)return 0;s=String(s).trim().replace(/[₩,\s]/g,'');if(!s||s==='-'||s.startsWith('#'))return 0;const n=parseFloat(s);return isNaN(n)?0:n;}
function autoFormatAmount(val){if(!val)return val;const s=String(val).trim();if(s==='-'||s===''||s.includes('%')||s.includes('▲')||s.includes('▼'))return val;const hasWon=s.includes('₩');const cleaned=s.replace(/[₩,\s]/g,'');if(!cleaned||isNaN(cleaned))return val;const n=parseFloat(cleaned);if(isNaN(n))return val;const formatted=n.toLocaleString('ko-KR');return hasWon?'₩'+formatted:formatted;}
function autoCalcTotals(){
  if(!jexcelInstance||!activeYear||!activeSection)return;
  const sec=sections[activeYear];
  if(!sec)return;
  const key=activeSection;
  const data=jexcelInstance.getData();
  const ms=sec.monthStart; // 월 데이터 컬럼 시작 인덱스 (rawSheet 기준)
  // data[0]은 헤더행이므로 컬럼 인덱스는 rawSheet와 동일
  // 스프레드시트의 컬럼 인덱스 = rawSheet의 컬럼 인덱스
  const numCols=data[0]?data[0].length:0;

  if(key==='income'||key==='savings'){
    // 합계행(column 1 === '계') = 나머지 모든 행의 합
    let totalRowIdx=-1;
    for(let r=1;r<data.length;r++){
      const c1=(data[r][1]||'').trim();
      if(c1==='계'||c1==='합계'){totalRowIdx=r;break;}
    }
    if(totalRowIdx<0)return;
    for(let c=ms;c<numCols;c++){
      let sum=0;
      for(let r=1;r<data.length;r++){
        if(r===totalRowIdx)continue;
        sum+=parseNum(data[r][c]);
      }
      const fmt=sum===0?'0':sum.toLocaleString('ko-KR');
      jexcelInstance.setValueFromCoords(c,totalRowIdx,fmt,false);
    }
  } else if(key==='expense'){
    // 합계행 = '잔액' 행 제외한 나머지 행의 합
    let totalRowIdx=-1, balanceRowIdx=-1;
    for(let r=1;r<data.length;r++){
      const c1=(data[r][1]||'').trim();
      if(c1==='계'||c1==='합계')totalRowIdx=r;
      if(c1.includes('잔액'))balanceRowIdx=r;
    }
    if(totalRowIdx>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0;
        for(let r=1;r<data.length;r++){
          if(r===totalRowIdx||r===balanceRowIdx)continue;
          sum+=parseNum(data[r][c]);
        }
        const fmt=sum===0?'0':sum.toLocaleString('ko-KR');
        jexcelInstance.setValueFromCoords(c,totalRowIdx,fmt,false);
      }
    }
    // 잔액행 = 소득계 - 저축계 - 지출계
    if(balanceRowIdx>=0){
      const incTotal=sec.income?sec.income.total:null;
      const savTotal=sec.savings?sec.savings.total:null;
      // 지출계는 방금 계산한 totalRowIdx 행 사용
      for(let c=ms;c<numCols;c++){
        const incVal=incTotal?parseNum(incTotal[c]):0;
        const savVal=savTotal?parseNum(savTotal[c]):0;
        let expVal=0;
        if(totalRowIdx>=0){
          // 방금 setValueFromCoords로 업데이트했지만 getData()는 아직 이전 값일 수 있으므로 직접 재계산
          for(let r=1;r<data.length;r++){
            if(r===totalRowIdx||r===balanceRowIdx)continue;
            expVal+=parseNum(data[r][c]);
          }
        }
        const balance=incVal-savVal-expVal;
        const fmt=balance===0?'0':(balance<0?'-':'')+Math.abs(balance).toLocaleString('ko-KR');
        jexcelInstance.setValueFromCoords(c,balanceRowIdx,fmt,false);
      }
    }
  } else if(key==='asset'){
    // 카테고리 상속: column 1이 비어있으면 직전 비어있지 않은 column 1 상속
    const EXCLUDE_CATS=['부동산','연금저축','대출'];
    let fluidTotalRowIdx=-1, grandTotalRowIdx=-1;
    for(let r=1;r<data.length;r++){
      const c1=(data[r][1]||'').trim();
      if(c1==='유동자산계')fluidTotalRowIdx=r;
      if(c1==='계'||c1==='합계')grandTotalRowIdx=r;
    }
    // 유동자산계: 부동산/연금저축/대출 제외한 항목 합
    if(fluidTotalRowIdx>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0;
        let lastCat='';
        for(let r=1;r<data.length;r++){
          if(r===fluidTotalRowIdx||r===grandTotalRowIdx)continue;
          const c1=(data[r][1]||'').trim();
          if(c1)lastCat=c1;
          const cat=c1||lastCat;
          if(EXCLUDE_CATS.includes(cat))continue;
          sum+=parseNum(data[r][c]);
        }
        const fmt='₩'+sum.toLocaleString('ko-KR');
        jexcelInstance.setValueFromCoords(c,fluidTotalRowIdx,fmt,false);
      }
    }
    // 계: 유동자산계/계 자체 제외하고 모든 항목 합 (부동산/연금저축/대출 포함)
    if(grandTotalRowIdx>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0;
        for(let r=1;r<data.length;r++){
          if(r===fluidTotalRowIdx||r===grandTotalRowIdx)continue;
          sum+=parseNum(data[r][c]);
        }
        const fmt='₩'+sum.toLocaleString('ko-KR');
        jexcelInstance.setValueFromCoords(c,grandTotalRowIdx,fmt,false);
      }
    }
  }
}
function fmtNum(n){if(n===0)return'-';return n.toLocaleString('ko-KR');}
function fmtWon(n){if(!n)return'-';const a=Math.abs(n);const sign=n<0?'-':'';if(a<10000)return sign+a.toLocaleString('ko-KR')+'원';if(a>=100000000){const eok=Math.floor(a/100000000);const man=Math.round((a%100000000)/10000);return sign+eok+'억'+(man?man.toLocaleString('ko-KR')+'만':'')+'원';}return sign+Math.round(a/10000).toLocaleString('ko-KR')+'만원';}

// ===== Parse month index from label =====
function monthNumFromLabel(label) {
  // "2026-03" -> 3, "24.11" -> 11, "2025-01" -> 1
  const m1 = label.match(/[-.](\d{1,2})$/);
  if (m1) return parseInt(m1[1]);
  return 0;
}

// ===== Irregular expense total for a given month number =====
function irMonthTotal(irregulars, monthNum) {
  return (irregulars||[]).reduce((s,ir) => {
    const m = parseInt((ir.month||'').match(/(\d+)/)?.[1]||'0');
    return m===monthNum ? s+(ir.amount||0) : s;
  }, 0);
}

// ===== Find default month index based on today =====
function getDefaultMonthIdx(months) {
  // Find the month matching this month, or closest previous
  let best = -1;
  for (let i = 0; i < months.length; i++) {
    const mn = monthNumFromLabel(months[i].label);
    if (mn <= THIS_MONTH) best = i;
  }
  // If current year doesn't match, find last with data
  if (best < 0 && months.length) best = months.length - 1;
  return best;
}

// ===== Split Sections =====
function splitSections(year){
  const data=rawSheets[year]; if(!data)return;
  let headerRow=-1, monthStart=-1;
  for(let r=0;r<Math.min(5,data.length);r++){for(let c=3;c<data[r].length;c++){const v=(data[r][c]||'').trim();if(/^\d{4}-\d{2}$/.test(v)||/^\d{2}\.\d{1,2}/.test(v)){headerRow=r;monthStart=c;break;}}if(headerRow>=0)break;}
  if(headerRow<0){headerRow=1;monthStart=4;}
  const months=[];
  for(let c=monthStart;c<data[headerRow].length;c++){const v=(data[headerRow][c]||'').trim();if(v&&!v.startsWith('*'))months.push({col:c,label:v});}

  let mode='',incRows=[],savRows=[],expRows=[],astRows=[];
  for(let r=0;r<data.length;r++){
    const c1=(data[r][1]||'').trim(), joined=data[r].join('').trim();
    if(!joined){mode='';continue;}
    if(c1.includes('급여')||c1==='순애 (90%)'||c1==='장훈 (90%)'||c1==='금융소득'||c1==='배당소득'||c1==='기타소득'||c1==='기타'){if(mode!=='savings'&&mode!=='expense'&&mode!=='asset')mode='income';}
    if((c1==='저축'||(c1==='비상금'&&mode!=='expense'))&&mode!=='asset')mode='savings';
    if(c1==='지출'||c1==='고정지출'||c1==='변동지출')mode='expense';
    if(c1.includes('자산')||c1==='부동산'||c1==='대출'||c1==='유동자산계')mode='asset';
    const isT=(c1==='합계'||c1==='계');
    if(mode==='income'){incRows.push(r);if(isT)mode='';}
    else if(mode==='savings'){savRows.push(r);if(isT)mode='';}
    else if(mode==='expense'){expRows.push(r);if(isT||c1.includes('잔액')||c1==='저축합계'||c1==='지출합계'){}}
    else if(mode==='asset'){
      // % 행 제외: col1 비어있고 월 데이터에 ▲/▼/% 포함
      const isPercentRow=!c1 && data[r].slice(monthStart).some(v=>/[▲▼]|^\d+\.\d+%$/.test(String(v||'').trim()));
      if(isPercentRow){
        const c2pct=(data[r][2]||'').trim();
        if(c2pct && astRows.length>0){
          const prevR=astRows[astRows.length-1];
          const prevC2=(data[prevR][2]||'').trim();
          if(prevC2 && !prevC2.includes(c2pct)) data[prevR][2]=prevC2+' ('+c2pct+')';
          else if(!prevC2) data[prevR][2]=c2pct;
        }
      } else {
        astRows.push(r);
      }
    }
    else{if(c1==='저축합계'||c1==='지출합계')expRows.push(r);}
  }
  const extract=(rows)=>{if(!rows.length)return[];const res=[data[headerRow]];rows.forEach(r=>res.push(data[r]));return res;};
  const getTotal=(rows)=>{for(let i=rows.length-1;i>=0;i--){const c1=(data[rows[i]][1]||'').trim();if(c1==='합계'||c1==='계')return data[rows[i]];}return null;};

  // Parse asset items for pie chart (individual + grouped)
  const assetItems = [];
  const assetGroupMap = {};
  astRows.forEach(r => {
    const c1 = (data[r][1]||'').trim();
    const c2 = (data[r][2]||'').trim();
    const c3 = (data[r][3]||'').trim();
    // Skip total/subtotal/empty/percentage rows
    if (c1==='계'||c1==='유동자산계'||!c1||c1.includes('자산')) return;
    if (c2.startsWith('▲')||c2.startsWith('▼')) return;
    // Get latest value
    let val = 0;
    for (let i=months.length-1;i>=0;i--) {
      const v = parseNum(data[r][months[i].col]);
      if (v) { val = v; break; }
    }
    if (val !== 0) {
      assetItems.push({ name: c1 + (c2 ? ' ' + c2 : ''), owner: c3, value: val, category: c1 });
      // 대출은 상세항목(c2)으로 구분, 나머지는 통장분류(c1)로 그룹
      const groupKey = c1 === '대출' ? (c2 || c1) : c1;
      if (!assetGroupMap[groupKey]) assetGroupMap[groupKey] = 0;
      assetGroupMap[groupKey] += val;
    }
  });
  const assetGroups = Object.entries(assetGroupMap).map(([name,value]) => ({name, value}));

  // Parse irregular expenses from columns R(17), S(18), T(19)
  const irregulars = [];
  for(let r=0;r<data.length;r++){
    const col17=(data[r][17]||'').trim();
    const col18=(data[r][18]||'').trim();
    const col19=(data[r][19]||'').trim();
    if(col17==='세금 및 비정기 지출') continue;
    if(col17){
      const amt=extractIrAmt(col19);
      irregulars.push({name:col17,month:col18,amount:amt>0?amt:null,memo:amt>0?'':col19});
    } else if(!col17 && col18 && !col19){
      if(irregulars.length>0){const last=irregulars[irregulars.length-1];last.memo=last.memo?last.memo+', '+col18:col18;}
    } else if(!col17 && col18){
      if(irregulars.length>0){const prev=irregulars[irregulars.length-1];const amt=extractIrAmt(col19);irregulars.push({name:prev.name,month:col18,amount:amt>0?amt:null,memo:amt>0?'':col19});}
    } else if(!col17 && !col18 && col19){
      const match=col19.match(/^(.+?)\s+(\d[\d,]*)$/);
      if(match) irregulars.push({name:match[1],month:'',amount:parseNum(match[2]),memo:''});
    }
  }

  sections[year]={months, monthStart, headerRow,
    income:{rows:incRows, data:extract(incRows), total:getTotal(incRows)},
    savings:{rows:savRows, data:extract(savRows), total:getTotal(savRows)},
    expense:{rows:expRows, data:extract(expRows), total:getTotal(expRows)},
    asset:{rows:astRows, data:extract(astRows), total:null, items:assetItems, groups:assetGroups},
    irregulars
  };
}

function extractIrAmt(s){
  if(!s)return 0;
  const m=s.match(/(\d[\d,]*)\s*$/);
  return m?parseNum(m[1]):0;
}

// ===== Retirement Coaching Generator =====
function generateRetirementCoaching(sec, months, curIdx, prevIdx) {
  const assetGroups = sec.asset.groups || [];
  const _totalPos = assetGroups.filter(a=>a.value>0).reduce((s,a)=>s+a.value,0);
  const _totalDebt = assetGroups.filter(a=>a.value<0).reduce((s,a)=>s+a.value,0);
  const _netAsset = _totalPos + _totalDebt;

  if (_netAsset <= 0) return '';

  const parts = [];
  const GOAL = 1500000000, GOAL_START = 2026, GOAL_END = 2036;
  const remaining = GOAL - _netAsset;
  const remainYears = Math.max(1, GOAL_END - THIS_YEAR);
  const needPerYear = remaining > 0 ? remaining / remainYears : 0;
  const goalPct = (_netAsset / GOAL * 100).toFixed(1);

  const housingVal = assetGroups.filter(a=>a.name && a.name.includes('부동산')).reduce((s,a)=>s+a.value,0);
  const liquidAssets = _netAsset - housingVal;

  parts.push(`<br><span class="highlight">── 은퇴 플랜 코칭 ──</span>`);
  parts.push(`순자산 ${fmtWon(_netAsset)} (목표 15억의 ${goalPct}%).`);

  if (housingVal > 0) {
    parts.push(`부동산(${fmtWon(housingVal)}) 제외 유동자산은 <span class="highlight">${fmtWon(liquidAssets)}</span>이며, 실질적으로 근로소득과 금융소득으로 채워야 할 금액입니다.`);
  }

  const savCur = (curIdx >= 0 && sec.savings.total) ? parseNum(sec.savings.total[months[curIdx].col]) : 0;
  const incCur = (curIdx >= 0 && sec.income.total) ? parseNum(sec.income.total[months[curIdx].col]) : 0;
  const expCur = ((curIdx >= 0 && sec.expense.total) ? parseNum(sec.expense.total[months[curIdx].col]) : 0) + (curIdx>=0 ? irMonthTotal(sec.irregulars, monthNumFromLabel(months[curIdx].label)) : 0);

  if (needPerYear > 0) {
    parts.push(`남은 ${remainYears}년간 연 <span class="warn">${fmtWon(needPerYear)}</span> 순자산 증가가 필요합니다.`);

    const annualSavings = savCur * 12;
    if (annualSavings > 0) {
      const coverage = (annualSavings / needPerYear * 100);
      if (coverage < 50) {
        parts.push(`<span class="down">현재 월 저축(${fmtWon(savCur)}, 연 ${fmtWon(annualSavings)})은 필요 금액의 ${coverage.toFixed(0)}%에 불과합니다. 저축 확대와 투자 수익률 개선이 시급합니다.</span>`);
      } else if (coverage < 80) {
        parts.push(`<span class="warn">현재 월 저축(${fmtWon(savCur)}, 연 ${fmtWon(annualSavings)})은 필요 금액의 ${coverage.toFixed(0)}% 수준입니다. 추가 소득원 확보나 지출 절감을 검토하세요.</span>`);
      } else {
        parts.push(`현재 월 저축(${fmtWon(savCur)}, 연 ${fmtWon(annualSavings)})으로 필요 금액의 ${coverage.toFixed(0)}%를 커버합니다.`);
      }
    }
  }

  if (incCur > 0 && expCur > 0) {
    const expRatio = (expCur / incCur * 100);
    if (expRatio > 50) {
      parts.push(`<span class="warn">소득 대비 지출 비율 ${expRatio.toFixed(0)}% — 은퇴 가속화를 위해 40% 이하로 낮추는 것이 이상적입니다.</span>`);
    } else {
      parts.push(`소득 대비 지출 비율 ${expRatio.toFixed(0)}%로 양호합니다.`);
    }
  }

  const suggestions = [];
  if (savCur > 0 && savCur * 12 < needPerYear) suggestions.push('배당주 월 납입액 추가 확대');
  if (expCur > 0 && incCur > 0 && expCur / incCur > 0.5) suggestions.push('변동지출(외식/쇼핑/여가) 절감');
  suggestions.push('금융소득(배당/이자) 재투자 극대화');
  if (suggestions.length) {
    parts.push(`<span class="highlight">개선 방향:</span> ${suggestions.join(' · ')}`);
  }

  return ' ' + parts.join(' ');
}

// ===== Monthly Summary Generator =====
function generateMonthlySummary(sec, months) {
  const day = TODAY.getDate();
  let curIdx, prevIdx, curLabel, prevLabel;

  if (selectedMonthIdx >= 0) {
    curIdx = selectedMonthIdx;
    prevIdx = curIdx - 1;
  } else {
    const defaultIdx = getDefaultMonthIdx(months);
    // Determine comparison months: >=26 this vs last, <26 last vs prev
    if (day >= 26) {
      curIdx = defaultIdx;
      prevIdx = curIdx - 1;
    } else {
      curIdx = defaultIdx > 0 ? defaultIdx - 1 : defaultIdx;
      prevIdx = curIdx - 1;
    }
  }

  // Check for AI-generated summary (per-month, based on comparison month)
  const yearSummaries = aiSummaries[activeYear];
  if (yearSummaries && curIdx >= 0 && curIdx < months.length) {
    const mn = String(monthNumFromLabel(months[curIdx].label)).padStart(2, '0');
    const aiSum = yearSummaries[mn];
    if (aiSum && aiSum.summary) {
      const trendMap = { up: 'tag-up', down: 'tag-down', neutral: 'tag-neutral' };
      const trendLabel = { up: '개선', down: '주의', neutral: '보합' };
      const cls = trendMap[aiSum.trend] || 'tag-neutral';
      const label = trendLabel[aiSum.trend] || '보합';
      let body = aiSum.summary;
      // 은퇴 플랜 코칭이 아직 없으면 동적 생성하여 추가
      if (!body.includes('은퇴 플랜 코칭')) {
        body += generateRetirementCoaching(sec, months, curIdx, prevIdx);
      }
      return {
        title: `${parseInt(aiSum.period)}월 브리핑`,
        tag: `<span class="summary-tag ${cls}">${label}</span>`,
        body: body,
        isAI: true,
        date: aiSum.date
      };
    }
  }

  if (curIdx < 0 || curIdx >= months.length) return null;

  // 전년도 12월 비교 지원
  let usePrevYear = false;
  let prevYearLastMonth = null;
  let prevYearSec = null;
  if (prevIdx < 0) {
    const prevYear = String(parseInt(activeYear) - 1);
    const pSec = sections[prevYear];
    if (pSec && pSec.months && pSec.months.length) {
      prevYearLastMonth = pSec.months[pSec.months.length - 1];
      prevYearSec = pSec;
      usePrevYear = true;
    } else {
      return null;
    }
  }

  curLabel = months[curIdx].label.replace(/^\d{4}-0?/, '').replace(/^0/, '') + '월';
  prevLabel = usePrevYear
    ? prevYearLastMonth.label.replace(/^\d{4}-0?/, '').replace(/^0/, '') + '월'
    : months[prevIdx].label.replace(/^\d{4}-0?/, '').replace(/^0/, '') + '월';

  const gv = (total) => total ? parseNum(total[months[curIdx].col]) : 0;
  const gvP = (total, sectionKey) => {
    if (usePrevYear && sectionKey && prevYearSec[sectionKey]) {
      const prevTotal = prevYearSec[sectionKey].total;
      return prevTotal ? parseNum(prevTotal[prevYearLastMonth.col]) : 0;
    }
    return total ? parseNum(total[months[prevIdx].col]) : 0;
  };

  const incCur = gv(sec.income.total), incPrev = gvP(sec.income.total, 'income');
  const savCur = gv(sec.savings.total), savPrev = gvP(sec.savings.total, 'savings');
  const expCur = gv(sec.expense.total) + irMonthTotal(sec.irregulars, monthNumFromLabel(months[curIdx].label));
  const expPrevBase = gvP(sec.expense.total, 'expense');
  const expPrevIr = usePrevYear
    ? irMonthTotal(prevYearSec.irregulars, monthNumFromLabel(prevYearLastMonth.label))
    : irMonthTotal(sec.irregulars, monthNumFromLabel(months[prevIdx].label));
  const expPrev = expPrevBase + expPrevIr;

  // Check if we have enough data
  if (!incCur && !incPrev && !expCur && !expPrev) return null;

  const pct = (cur, prev) => prev ? ((cur - prev) / Math.abs(prev) * 100) : null;
  const incPct = pct(incCur, incPrev);
  const savPct = pct(savCur, savPrev);
  const expPct = pct(expCur, expPrev);
  const balCur = incCur - savCur - expCur;
  const balPrev = incPrev - savPrev - expPrev;

  // Find biggest expense changes (detail rows)
  const data = rawSheets[activeYear];
  const expRows = sec.expense.rows || [];
  const expChanges = [];
  if (!usePrevYear) {
    expRows.forEach(r => {
      const c1 = (data[r][1]||'').trim();
      const c2 = (data[r][2]||'').trim();
      if (c1==='계'||c1==='합계'||c1.includes('잔액')||!c1) return;
      const name = c2 || c1;
      const cur = parseNum(data[r][months[curIdx].col]);
      const prev = parseNum(data[r][months[prevIdx].col]);
      if (cur || prev) {
        const diff = cur - prev;
        expChanges.push({ name, cur, prev, diff, pct: prev ? (diff/Math.abs(prev)*100) : (cur ? 100 : 0) });
      }
    });
  }
  expChanges.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  // Find biggest income changes
  const incRows = sec.income.rows || [];
  const incChanges = [];
  if (!usePrevYear) {
    incRows.forEach(r => {
      const c1 = (data[r][1]||'').trim();
      const c2 = (data[r][2]||'').trim();
      const c3 = (data[r][3]||'').trim();
      if (c1==='계'||c1==='합계'||!c1) return;
      const name = (c2||c1) + (c3 ? `(${c3})` : '');
      const cur = parseNum(data[r][months[curIdx].col]);
      const prev = parseNum(data[r][months[prevIdx].col]);
      if (cur || prev) {
        const diff = cur - prev;
        incChanges.push({ name, cur, prev, diff });
      }
    });
  }
  incChanges.sort((a,b) => Math.abs(b.diff) - Math.abs(a.diff));

  // Build commentary
  const parts = [];
  const titleParts = [];

  // Income analysis
  if (incPct !== null) {
    if (Math.abs(incPct) < 3) {
      parts.push(`소득은 ${fmtWon(incCur)}으로 전월과 비슷한 수준입니다.`);
    } else if (incPct > 0) {
      parts.push(`소득이 <span class="highlight">${fmtWon(incCur)}</span>으로 전월 대비 <span class="highlight">+${incPct.toFixed(0)}%</span> 증가했습니다.`);
      if (incChanges.length && incChanges[0].diff > 0) {
        parts.push(`${incChanges[0].name}이(가) ${fmtWon(Math.abs(incChanges[0].diff))} 늘어난 것이 주요 요인입니다.`);
      }
    } else {
      parts.push(`소득이 <span class="down">${fmtWon(incCur)}</span>으로 전월 대비 <span class="down">${incPct.toFixed(0)}%</span> 감소했습니다.`);
      if (incChanges.length && incChanges[0].diff < 0) {
        parts.push(`${incChanges[0].name}이(가) ${fmtWon(Math.abs(incChanges[0].diff))} 줄었습니다.`);
      }
    }
  }

  // Expense analysis
  if (expPct !== null) {
    const expIncomplete = expChanges.some(e => e.name.includes('생활비') && e.cur === 0 && e.prev > 0)
                       || expChanges.some(e => e.name.includes('기타') && e.cur === 0 && e.prev > 0);

    if (expIncomplete && day >= 26) {
      parts.push(`지출은 <span class="warn">${fmtWon(expCur)}</span>인데, 아직 미입력 항목(생활비/기타)이 있어 실제 지출은 더 높을 수 있습니다.`);
    } else if (expPct < -10) {
      parts.push(`지출이 <span class="highlight">${fmtWon(expCur)}</span>으로 전월 대비 <span class="highlight">${expPct.toFixed(0)}%</span> 크게 줄었습니다.`);
    } else if (expPct > 10) {
      parts.push(`지출이 <span class="down">${fmtWon(expCur)}</span>으로 전월 대비 <span class="down">+${expPct.toFixed(0)}%</span> 증가했습니다.`);
    } else {
      parts.push(`지출은 ${fmtWon(expCur)}으로 전월과 유사합니다.`);
    }

    // Top expense changes
    const topExp = expChanges.filter(e => Math.abs(e.diff) > 50000).slice(0, 3);
    if (topExp.length) {
      const items = topExp.map(e => {
        const dir = e.diff > 0 ? '증가' : '감소';
        const cls = e.diff > 0 ? 'warn' : 'highlight';
        return `<span class="${cls}">${e.name}(${dir} ${fmtWon(Math.abs(e.diff))})</span>`;
      });
      parts.push(`주요 변동: ${items.join(', ')}`);
    }
  }

  // Savings analysis
  if (savPct !== null && (savCur || savPrev)) {
    if (savCur > savPrev) {
      parts.push(`저축은 <span class="highlight">${fmtWon(savCur)}</span>으로 전월보다 늘렸습니다.`);
    } else if (savCur < savPrev) {
      parts.push(`저축은 ${fmtWon(savCur)}으로 전월 대비 소폭 줄었습니다.`);
    } else {
      parts.push(`저축은 ${fmtWon(savCur)}으로 동일합니다.`);
    }
  }

  // Balance verdict
  if (balCur > 0 && balPrev <= 0) {
    parts.push(`급여 대비 잔액이 <span class="highlight">흑자 전환(${fmtWon(balCur)})</span>되어 좋은 흐름입니다.`);
  } else if (balCur <= 0 && balPrev > 0) {
    parts.push(`급여 대비 잔액이 <span class="down">적자 전환(${fmtWon(balCur)})</span>되었습니다. 지출 관리에 유의하세요.`);
  } else if (balCur > 0 && balCur > balPrev) {
    parts.push(`급여 대비 잔액이 ${fmtWon(balCur)}으로 개선되었습니다.`);
  }

  // ── 은퇴 플랜 코칭 ──
  const retirementCoaching = generateRetirementCoaching(sec, months, curIdx, prevIdx);
  if (retirementCoaching) {
    parts.push(retirementCoaching.trim());
  }

  // Title tag
  const overallTrend = (incPct||0) > 0 && (expPct||0) < 0 ? 'up' :
                       (incPct||0) < 0 && (expPct||0) > 0 ? 'down' : 'neutral';
  const tagCls = overallTrend==='up' ? 'tag-up' : overallTrend==='down' ? 'tag-down' : 'tag-neutral';
  const tagText = overallTrend==='up' ? '개선' : overallTrend==='down' ? '주의' : '보합';

  return {
    title: `${prevLabel} → ${curLabel} 비교`,
    tag: `<span class="summary-tag ${tagCls}">${tagText}</span>`,
    body: parts.join(' ')
  };
}

// ===== Dashboard =====
function renderDashboard(container){
  const sec=sections[activeYear];
  if(!sec){container.innerHTML='<p style="color:var(--text-muted)">데이터 없음</p>';return;}
  const months=sec.months;
  const gv=(tr)=>months.map(m=>tr?parseNum(tr[m.col]):0);
  const irV=months.map(m=>irMonthTotal(sec.irregulars,monthNumFromLabel(m.label)));
  const incV=gv(sec.income.total), savV=gv(sec.savings.total), expV=gv(sec.expense.total).map((v,i)=>v+irV[i]);

  // Determine selected month
  if(selectedMonthIdx<0) selectedMonthIdx=getDefaultMonthIdx(months);
  const si=selectedMonthIdx;
  let prevInc=0, prevSav=0, prevExp=0;
  if (si > 0) {
    const pi = si - 1;
    prevInc = incV[pi]; prevSav = savV[pi]; prevExp = expV[pi];
  } else {
    // 1월: 전년도 12월과 비교
    const prevYear = String(parseInt(activeYear) - 1);
    const prevSec = sections[prevYear];
    if (prevSec && prevSec.months && prevSec.months.length) {
      const lastMonth = prevSec.months[prevSec.months.length - 1];
      prevInc = prevSec.income && prevSec.income.total ? parseNum(prevSec.income.total[lastMonth.col]) : 0;
      prevSav = prevSec.savings && prevSec.savings.total ? parseNum(prevSec.savings.total[lastMonth.col]) : 0;
      prevExp = (prevSec.expense && prevSec.expense.total ? parseNum(prevSec.expense.total[lastMonth.col]) : 0) + irMonthTotal(prevSec.irregulars, monthNumFromLabel(lastMonth.label));
    }
  }
  const calcChg2=(cur,prev)=>prev?((cur-prev)/Math.abs(prev)*100):null;
  const chgHtml=(v)=>{if(v===null)return'';const d=v>=0?'up':'down';const a=v>=0?'&#9650;':'&#9660;';return`<div class="card-change ${d}">${a} ${Math.abs(v).toFixed(1)}% vs 전월</div>`;};

  // Asset totals (자산총액, 부채총액, 순자산)
  const assetGroups = sec.asset.groups || [];
  const totalPositive = assetGroups.filter(a=>a.value>0).reduce((s,a)=>s+a.value,0);
  const totalDebt = assetGroups.filter(a=>a.value<0).reduce((s,a)=>s+a.value,0);
  const netAsset = totalPositive + totalDebt;

  // Month pills
  let pillsHtml = months.map((m,i) => {
    const mn = monthNumFromLabel(m.label);
    const hasData = incV[i] || savV[i] || expV[i];
    const cls = i===si ? 'active' : (!hasData ? 'disabled' : '');
    const shortLabel = m.label.replace(/^\d{4}-/,'').replace(/^24\./,'');
    return `<button class="month-pill ${cls}" onclick="selectMonth(${i})">${shortLabel}</button>`;
  }).join('');

  // Asset groups for pie (카테고리별 그룹) - assetGroups already declared above
  const positiveGroups = assetGroups.filter(a => a.value > 0);
  const negativeGroups = assetGroups.filter(a => a.value < 0);

  // Generate monthly summary
  const summary = generateMonthlySummary(sec, months);
  const summaryHtml = summary ? `
  <div class="summary-banner${summary.isAI ? ' is-ai' : ''}">
    <div class="ai-corner"></div>
    <div class="summary-title">
      <span class="ai-badge">AI</span>
      ${summary.tag}${summary.title}${summary.date ? `<span style="margin-left:auto;font-size:10px;color:var(--text-dim);font-weight:500;text-transform:none;letter-spacing:0">${summary.date}</span>` : ''}
    </div>
    <div class="summary-body">${summary.body}</div>
  </div>` : '';

  // Milestone: 10-year retirement goal (15억, 2026-2036)
  const GOAL_START = 2026, GOAL_END = 2036, GOAL_AMOUNT = 1500000000;
  const YEARLY_TARGET = GOAL_AMOUNT / (GOAL_END - GOAL_START); // 1.5억/year
  const currentAssets = totalPositive + totalDebt; // 전체 자산(부동산 포함) - 부채
  const yearsElapsed = THIS_YEAR - GOAL_START + (THIS_MONTH - 1) / 12;
  const expectedNow = Math.min(GOAL_AMOUNT, YEARLY_TARGET * yearsElapsed);
  const goalPct = Math.min(100, (currentAssets / GOAL_AMOUNT * 100));
  const expectedPct = Math.min(100, (expectedNow / GOAL_AMOUNT * 100));
  const gap = currentAssets - expectedNow;

  let milestoneMarkers = '';
  for (let y = GOAL_START; y <= GOAL_END; y++) {
    const targetAtYear = YEARLY_TARGET * (y - GOAL_START);
    const reached = currentAssets >= targetAtYear;
    const isCurrent = y === THIS_YEAR;
    const dotCls = isCurrent ? 'current' : (reached ? 'reached' : '');
    milestoneMarkers += `<div class="milestone-marker"><div class="dot ${dotCls}"></div><div class="yr">${String(y).slice(2)}</div><div class="amt">${fmtWon(targetAtYear)||'0'}</div></div>`;
  }

  const gapText = gap >= 0
    ? `<span style="color:var(--green)">목표 대비 +${fmtWon(gap)} 초과</span>`
    : `<span style="color:var(--red)">목표 대비 ${fmtWon(gap)} 부족</span>`;
  const remainYears = GOAL_END - THIS_YEAR;
  const needPerYear = remainYears > 0 ? (GOAL_AMOUNT - currentAssets) / remainYears : 0;

  const milestoneHtml = currentAssets > 0 ? `
  <div class="milestone-card">
    <div class="milestone-header">
      <h3>은퇴 마일스톤 — 10년 15억 목표</h3>
      <div class="milestone-meta">${GOAL_START}~${GOAL_END} · 연 ${fmtWon(YEARLY_TARGET)} 목표</div>
    </div>
    <div class="milestone-bar-wrap">
      <div class="milestone-bar-fill" style="width:${Math.max(goalPct,1)}%" data-pct="${goalPct.toFixed(1)}%"></div>
    </div>
    <div class="milestone-markers">${milestoneMarkers}</div>
    <div class="milestone-stats">
      <div class="milestone-stat">현재 유동자산: <strong>${fmtWon(currentAssets)}</strong></div>
      <div class="milestone-stat">예상 도달: <strong>${fmtWon(Math.round(expectedNow))}</strong></div>
      <div class="milestone-stat">${gapText}</div>
      <div class="milestone-stat">남은 기간 연 필요: <strong>${fmtWon(Math.round(needPerYear))}</strong></div>
    </div>
  </div>` : '';

  let html = `
  <div class="month-selector">
    <label>기준월</label>
    <div class="month-pills">${pillsHtml}</div>
  </div>

  ${summaryHtml}
  ${milestoneHtml}

  <div class="dash-grid">
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--green-bg);color:var(--green)">&#8593;</span>소득</div>
      <div class="card-value" style="color:var(--green)">${fmtWon(incV[si])}</div>
      ${chgHtml(calcChg2(incV[si],prevInc))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--blue-bg);color:var(--blue)">&#9776;</span>저축</div>
      <div class="card-value" style="color:var(--blue)">${fmtWon(savV[si])}</div>
      ${chgHtml(calcChg2(savV[si],prevSav))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--amber-bg);color:var(--amber)">&#8595;</span>지출</div>
      <div class="card-value" style="color:var(--amber)">${fmtWon(expV[si])}</div>
      ${chgHtml(calcChg2(expV[si],prevExp))}
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--cyan-bg);color:var(--cyan)">&#9650;</span>자산 총액</div>
      <div class="card-value" style="color:var(--cyan)">${totalPositive?fmtWon(totalPositive):'-'}</div>
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--red-bg);color:var(--red)">&#9660;</span>부채</div>
      <div class="card-value" style="color:var(--red)">${totalDebt?fmtWon(totalDebt):'-'}</div>
    </div>
    <div class="dash-card">
      <div class="card-label"><span class="card-icon" style="background:var(--pink-bg);color:var(--pink)">&#9733;</span>순자산</div>
      <div class="card-value" style="color:var(--pink)">${netAsset?fmtWon(netAsset):'-'}</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3>월별 수입 vs 지출</h3>
      <div id="chIncExp" style="height:260px"></div>
    </div>
    <div class="chart-card">
      <h3>월별 저축 vs 지출</h3>
      <div id="chSav" style="height:260px"></div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <h3 id="expPieTitle">${months[si] ? months[si].label.replace(/^\d{4}-/,'') : ''}월 지출 구성</h3>
      <div id="chExpPie" style="height:300px"></div>
    </div>
    <div class="chart-card full" style="grid-column:unset">
      <h3>월별 상세 지출 항목</h3>
      <div id="chExpBar" style="height:300px"></div>
    </div>
  </div>


  ${positiveGroups.length ? `
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <span style="font-size:13px;color:var(--text-muted);font-weight:500">자산 보기</span>
    <button class="month-pill ${assetViewMode==='group'?'active':''}" onclick="setAssetView('group')">유형별</button>
    <button class="month-pill ${assetViewMode==='detail'?'active':''}" onclick="setAssetView('detail')">전체 상세</button>
  </div>
  <div class="chart-row">
    <div class="chart-card">
      <h3>${assetViewMode==='group'?'자산 유형별 구성':'자산 상세 구성'}</h3>
      <div id="chAssetPie" style="height:300px"></div>
    </div>
    <div class="chart-card">
      <h3>부채</h3>
      <div id="chDebtPie" style="height:300px"></div>
    </div>
  </div>` : ''}

  <div class="chart-card" style="margin-bottom:20px">
    <h3>월별 상세</h3>
    <div class="mtable-wrap">
    <table class="mtable">
      <thead><tr><th>월</th><th class="n">소득</th><th class="n">저축</th><th class="n">지출</th><th class="n">잔액</th></tr></thead>
      <tbody>`;

  const lastData = months.reduce((acc,_,i) => (incV[i]||savV[i]||expV[i]) ? i : acc, 0);
  for(let i=0;i<=lastData;i++){
    const bal=incV[i]-savV[i]-expV[i];
    const hl=i===si?' class="hl"':'';
    html+=`<tr${hl}><td>${months[i].label}</td><td class="n">${fmtNum(incV[i])}</td><td class="n">${fmtNum(savV[i])}</td><td class="n">${fmtNum(expV[i])}</td><td class="n ${bal>=0?'pos':'neg'}">${fmtNum(bal)}</td></tr>`;
  }
  html+=`</tbody></table></div></div>`;
  if(sec.irregulars && sec.irregulars.length){
    const monthOrder=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    const monthKey=m=>{if(!m)return 99;const idx=monthOrder.findIndex(mo=>m.includes(mo.replace('월','')));return idx>=0?idx:99;};
    const grouped={};
    sec.irregulars.forEach(ir=>{const mk=ir.month||'기타';const key=monthOrder.find(mo=>mk.includes(mo.replace('월','')))||'기타';if(!grouped[key])grouped[key]=[];grouped[key].push(ir);});
    const sortedKeys=Object.keys(grouped).sort((a,b)=>monthKey(a)-monthKey(b));
    const irTotal=sec.irregulars.reduce((s,ir)=>s+(ir.amount||0),0);
    let irHtml='';
    sortedKeys.forEach(month=>{
      const items=grouped[month];
      const monthTotal=items.reduce((s,ir)=>s+(ir.amount||0),0);
      irHtml+=`<div style="margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:14px;font-weight:700;color:var(--text)">${month}</span><span style="font-size:13px;font-weight:600;color:var(--amber)">${monthTotal?fmtWon(monthTotal):''}</span></div>${items.map(ir=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-card);border-radius:10px;margin-bottom:4px;border:1px solid var(--border)"><div><span style="font-size:13px;color:var(--text)">${ir.name}</span>${ir.memo?'<span style="font-size:11px;color:var(--text-muted);margin-left:8px">'+ir.memo+'</span>':''}</div><span style="font-size:13px;font-weight:600;color:${ir.amount?'var(--amber)':'var(--text-muted)'};font-family:var(--font-num)">${ir.amount?fmtWon(ir.amount):'-'}</span></div>`).join('')}</div>`;
    });
    html+=`<div class="chart-card" style="margin-top:20px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><div style="display:flex;align-items:center;gap:10px"><h3>비정기 지출</h3><span style="display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;background:var(--amber-bg);color:var(--amber)">연간</span></div><span style="font-size:15px;font-weight:700;color:var(--amber)">${fmtWon(irTotal)}</span></div><p style="color:var(--text-muted);font-size:13px;margin-bottom:16px">세금, 경조사, 보험 등 매달 발생하지 않는 지출 항목</p>${irHtml}</div>`;
  }
  container.innerHTML=html;

  // Charts (ECharts) — defer to next frame so DOM layout is settled
  const labels=months.slice(0,lastData+1).map(m=>{const s=m.label.replace(/^\d{4}-/,'').replace(/^24\./,'');return s;});
  requestAnimationFrame(()=>{

  // 1. Income vs Expense Bar
  {const el=document.getElementById('chIncExp');
    if(el) initChart(el,{
      tooltip:{...ecTooltip,trigger:'axis',axisPointer:{type:'shadow'},formatter:ps=>ps.map(p=>`<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`).join('<br>')},
      legend:{...ecLegend,top:0,right:0,data:['소득','지출']},
      grid:{left:60,right:16,top:36,bottom:24,containLabel:false},
      xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false},splitLine:{show:false}},
      yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
      series:[
        {name:'소득',type:'bar',data:incV.slice(0,lastData+1),color:'#2dd4bf',barWidth:'35%',itemStyle:{borderRadius:[3,3,0,0]}},
        {name:'지출',type:'bar',data:expV.slice(0,lastData+1),color:'#f59e0b',barWidth:'35%',itemStyle:{borderRadius:[3,3,0,0]}}
      ],
      animationDuration:600,animationEasing:'cubicOut'
    });
  }

  // 2. Savings vs Expense Area
  {const el=document.getElementById('chSav');
    if(el) initChart(el,{
      tooltip:{...ecTooltip,trigger:'axis',formatter:ps=>ps.map(p=>`<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`).join('<br>')},
      legend:{...ecLegend,top:0,right:0,data:['저축','지출']},
      grid:{left:60,right:16,top:36,bottom:24,containLabel:false},
      xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false},splitLine:{show:false},boundaryGap:false},
      yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
      series:[
        {name:'저축',type:'line',data:savV.slice(0,lastData+1),color:'#60a5fa',smooth:true,symbol:'circle',symbolSize:6,lineStyle:{width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(96,165,250,0.25)'},{offset:1,color:'rgba(96,165,250,0.02)'}])}},
        {name:'지출',type:'line',data:expV.slice(0,lastData+1),color:'#f59e0b',smooth:true,symbol:'circle',symbolSize:6,lineStyle:{width:2},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(245,158,11,0.25)'},{offset:1,color:'rgba(245,158,11,0.02)'}])}}
      ],
      animationDuration:600,animationEasing:'cubicOut'
    });
  }

  // Expense Pie & Bar
  {
    const data = rawSheets[activeYear];
    const expRows = sec.expense.rows || [];
    const expItemMap = {};
    expRows.forEach(r => {
      const c1 = (data[r][1]||'').trim();
      const c2 = (data[r][2]||'').trim();
      if (c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
      const name = c2 || c1;
      if (!name) return;
      const val = parseNum(data[r][months[si].col]);
      if (val > 0) expItemMap[name] = (expItemMap[name]||0) + val;
    });
    // Add irregular expenses for selected month
    const siMn = monthNumFromLabel(months[si].label);
    (sec.irregulars||[]).forEach(ir => {
      if (parseInt((ir.month||'').match(/(\d+)/)?.[1]||'0')===siMn && ir.amount>0)
        expItemMap[ir.name] = (expItemMap[ir.name]||0) + ir.amount;
    });
    const expItems = Object.entries(expItemMap).map(([name,val])=>({name,val}));
    const expColors=['#fbbf24','#f87171','#a78bfa','#34d399','#f472b6','#60a5fa','#fb923c','#22d3ee','#4ade80','#e879f9','#38bdf8','#818cf8'];
    // Pie: fallback to most recent month with data if selected month is empty
    let pieItems = expItems;
    let pieLabel = months[si] ? months[si].label.replace(/^\d{4}-/,'')+'월' : '';
    if(pieItems.length < 3){
      for(let fi=lastData;fi>=0;fi--){
        const tmpMap={};
        expRows.forEach(r=>{
          const c1=(data[r][1]||'').trim(),c2=(data[r][2]||'').trim();
          if(c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
          const name=c2||c1; if(!name) return;
          const v=parseNum(data[r][months[fi].col]);
          if(v>0) tmpMap[name]=(tmpMap[name]||0)+v;
        });
        const tmp=Object.entries(tmpMap).map(([name,val])=>({name,val}));
        if(tmp.length){pieItems=tmp;pieLabel=months[fi].label.replace(/^\d{4}-/,'')+'월';break;}
      }
    }
    pieItems.sort((a,b)=>b.val-a.val);
    const pieTotal = pieItems.reduce((s,e)=>s+e.val,0);
    const expPieTitleEl = document.getElementById('expPieTitle');
    if(expPieTitleEl) expPieTitleEl.textContent = pieLabel+' 지출 구성';

    // 3. Expense Donut
    if(pieItems.length){
      const el=document.getElementById('chExpPie');
      if(el){
        const expChart=initChart(el,{
          tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
          legend:{...ecLegend,orient:'horizontal',bottom:4,type:'scroll',data:pieItems.map(e=>e.name),selectedMode:true},
          graphic:[{type:'text',left:'center',top:'38%',style:{text:fmtWon(pieTotal),fill:'#e2eaf3',fontSize:16,fontWeight:700,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}},{type:'text',left:'center',top:'46%',style:{text:'합계',fill:'#7a8ba0',fontSize:11,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}}],
          series:[{
            type:'pie',radius:['40%','68%'],center:['50%','42%'],
            data:pieItems.map((e,i)=>({name:e.name,value:e.val,itemStyle:{color:expColors[i%expColors.length]}})),
            label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:13,fontWeight:600,fontFamily:'Plus Jakarta Sans,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
            labelLine:{show:false},
            itemStyle:{borderColor:'transparent',borderWidth:0},
            animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*60
          }]
        });
        expChart.on('legendselectchanged',function(params){
          const sel=params.selected;let t=0;
          pieItems.forEach(e=>{if(sel[e.name])t+=e.val;});
          expChart.setOption({graphic:[{style:{text:fmtWon(t)}}]});
        });
      }
    }

    // 4. Monthly Expense Stacked Bar
    const allExpCats = new Set();
    expRows.forEach(r => {
      const c1=(data[r][1]||'').trim(), c2=(data[r][2]||'').trim();
      if(c1==='계'||c1==='합계'||c1.includes('잔액')||c1==='지출') return;
      const name=c2||c1; if(name) allExpCats.add(name);
    });
    if(allExpCats.size){
      const cats = Array.from(allExpCats);
      const expBarSeries = cats.map((cat,ci) => {
        const vals = months.slice(0,lastData+1).map(m => {
          let sum=0;
          for(const r of expRows){
            const c1=(data[r][1]||'').trim(), c2=(data[r][2]||'').trim();
            if((c2||c1)===cat) sum+=parseNum(data[r][m.col]);
          }
          return sum;
        });
        return {name:cat,type:'bar',stack:'exp',data:vals,color:expColors[ci%expColors.length],itemStyle:{borderRadius:[0,0,0,0]},barWidth:'55%'};
      });
      // Add 비정기 series
      const irBarVals = months.slice(0,lastData+1).map(m=>irMonthTotal(sec.irregulars,monthNumFromLabel(m.label)));
      if(irBarVals.some(v=>v>0)) expBarSeries.push({name:'비정기',type:'bar',stack:'exp',data:irBarVals,color:'#fb923c',itemStyle:{borderRadius:[2,2,0,0]},barWidth:'55%'});
      else if(expBarSeries.length) expBarSeries[expBarSeries.length-1].itemStyle.borderRadius=[2,2,0,0];
      const allCats = [...cats,...(irBarVals.some(v=>v>0)?['비정기']:[])];
      const el=document.getElementById('chExpBar');
      if(el) initChart(el,{
        tooltip:{...ecTooltip,trigger:'axis',axisPointer:{type:'shadow'},formatter:ps=>{let t=0;const lines=ps.filter(p=>p.value).map(p=>{t+=p.value;return `<span style="color:${p.color}">●</span> ${p.seriesName}: ${fmtWon(p.value)}`;});lines.push(`<b>합계: ${fmtWon(t)}</b>`);return lines.join('<br/>');}},
        legend:{...ecLegend,top:0,type:'scroll',data:allCats},
        grid:{left:60,right:16,top:40,bottom:24,containLabel:false},
        xAxis:{type:'category',data:labels,axisLabel:{...ecTextStyle,fontSize:11},axisLine:ecAxisLine,axisTick:{show:false}},
        yAxis:{type:'value',axisLabel:{...ecTextStyle,fontSize:10,formatter:v=>fmtWon(v)},axisLine:{show:false},axisTick:{show:false},splitLine:ecSplitLine},
        series:expBarSeries,
        animationDuration:600,animationEasing:'cubicOut'
      });
    }
  }

  // Asset & Debt Donuts (ECharts)
  if(positiveGroups.length){
    const pieColors=['#2dd4bf','#60a5fa','#fbbf24','#f472b6','#a78bfa','#34d399','#fb923c','#4ade80','#818cf8','#f87171','#38bdf8','#e879f9'];
    const assetItems = sec.asset.items || [];
    const positiveItems = assetItems.filter(a => a.value > 0);
    const pieData = assetViewMode==='group' ? positiveGroups : positiveItems;
    const pieTotal2 = pieData.reduce((s,a)=>s+a.value,0);

    // 5. Asset Donut
    {const el=document.getElementById('chAssetPie');
      if(el){
        const assetChart=initChart(el,{
          tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
          legend:{...ecLegend,bottom:4,type:'scroll',data:pieData.map(a=>a.name),selectedMode:true},
          graphic:[{type:'text',left:'center',top:'40%',style:{text:fmtWon(pieTotal2),fill:'#e2eaf3',fontSize:16,fontWeight:700,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}},{type:'text',left:'center',top:'48%',style:{text:'합계',fill:'#7a8ba0',fontSize:11,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}}],
          series:[{
            type:'pie',radius:['42%','70%'],center:['50%','45%'],
            data:pieData.map((a,i)=>({name:a.name,value:a.value,itemStyle:{color:pieColors[i%pieColors.length]}})),
            label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:12,fontWeight:600,fontFamily:'Plus Jakarta Sans,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
            labelLine:{show:false},
            itemStyle:{borderColor:'transparent',borderWidth:0},
            animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*50
          }]
        });
        assetChart.on('legendselectchanged',function(params){
          const sel=params.selected;let t=0;
          pieData.forEach(a=>{if(sel[a.name])t+=a.value;});
          assetChart.setOption({graphic:[{style:{text:fmtWon(t)}}]});
        });
      }
    }

    // 6. Debt Donut
    if(negativeGroups.length){
      const negItems = assetItems.filter(a => a.value < 0);
      const debtData = assetViewMode==='group' ? negativeGroups : negItems;
      const debtTotal = debtData.reduce((s,a)=>s+Math.abs(a.value),0);
      const debtColors=['#fb7185','#fb923c','#fbbf24','#f472b6'];
      const el=document.getElementById('chDebtPie');
      if(el){
        const debtChart=initChart(el,{
          tooltip:{...ecTooltip,trigger:'item',formatter:p=>`<span style="color:${p.color}">●</span> ${p.name}<br/>${fmtWon(p.value)} (${p.percent}%)`},
          legend:{...ecLegend,bottom:4,type:'scroll',data:debtData.map(a=>a.name),selectedMode:true},
          graphic:[{type:'text',left:'center',top:'40%',style:{text:fmtWon(debtTotal),fill:'#e2eaf3',fontSize:16,fontWeight:700,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}},{type:'text',left:'center',top:'48%',style:{text:'합계',fill:'#7a8ba0',fontSize:11,fontFamily:'Plus Jakarta Sans,sans-serif',textAlign:'center'}}],
          series:[{
            type:'pie',radius:['42%','70%'],center:['50%','45%'],
            data:debtData.map((a,i)=>({name:a.name,value:Math.abs(a.value),itemStyle:{color:debtColors[i%debtColors.length]}})),
            label:{show:false},emphasis:{label:{show:true,color:'#e2eaf3',fontSize:12,fontWeight:600,fontFamily:'Plus Jakarta Sans,sans-serif',formatter:p=>`${p.name}\n${fmtWon(p.value)}`},itemStyle:{shadowBlur:12,shadowColor:'rgba(0,0,0,0.3)'}},
            labelLine:{show:false},
            itemStyle:{borderColor:'transparent',borderWidth:0},
            animationType:'scale',animationEasing:'elasticOut',animationDelay:i=>i*50
          }]
        });
        debtChart.on('legendselectchanged',function(params){
          const sel=params.selected;let t=0;
          debtData.forEach(a=>{if(sel[a.name])t+=Math.abs(a.value);});
          debtChart.setOption({graphic:[{style:{text:fmtWon(t)}}]});
        });
      }
    }
  }

  // Force resize after init to fix canvas dimensions
  setTimeout(()=>{chartInstances.forEach(c=>{try{c.resize();}catch(e){}});},50);
  }); // end requestAnimationFrame
}

// ===== Spreadsheet =====
function renderSpreadsheet(container,key){
  const sec=sections[activeYear];
  if(!sec||!sec[key]){container.innerHTML='<p style="color:var(--text-muted)">데이터 없음</p>';return;}
  const sData=sec[key].data;
  if(!sData.length){container.innerHTML='<p style="color:var(--text-muted)">해당 섹션 데이터가 없습니다.</p>';return;}
  const names={income:'소득',savings:'저축',expense:'지출',asset:'자산'};
  const receiptBtn=key==='expense'?`<button class="btn" onclick="openReceiptUpload()" title="카드 명세서 PDF/이미지를 업로드하여 자동 분석">📎 영수증 분석</button>`:'';
  container.innerHTML=`<div class="sheet-toolbar"><button class="btn" onclick="sheetInsertRow()">+ 행 추가</button><button class="btn" onclick="sheetUndo()">&#8617; 되돌리기</button><button class="btn primary" onclick="sheetDownload()">&#128190; CSV 저장</button><button class="btn primary" onclick="saveToGitHub()">☁️ 저장</button>${receiptBtn}<span class="gh-connected" id="ghStatus"></span><div class="filter-bar"><button class="filter-btn active" onclick="setFilter('all',this)">전체</button><button class="filter-btn" onclick="setFilter('장훈',this)">장훈</button><button class="filter-btn" onclick="setFilter('순애',this)">순애</button><button class="filter-btn" onclick="setFilter('공통',this)">공통</button></div><span class="sheet-status" id="sheetStatus"></span></div><div id="spreadsheet"></div>`;
  const nc=sData[0].length;
  // col 0(A): 숨김, col 1(B): 통장분류+상세항목 합쳐서 표시, col 2(C): 숨김, col 3(D): 숨김, col 4+: 월별
  const cols=[];for(let i=0;i<nc;i++){
    if(i===0)cols.push({type:'text',width:1});
    else if(i===1)cols.push({type:'text',width:130});
    else if(i===2)cols.push({type:'text',width:1});
    else if(i===3)cols.push({type:'text',width:1});
    else cols.push({type:'text',width:95});
  }
  jexcelInstance=jspreadsheet(document.getElementById('spreadsheet'),{
    data:sData.map(r=>[...r]), columns:cols, defaultColWidth:95,
    tableOverflow:true, tableWidth:(document.getElementById('spreadsheet').offsetWidth||window.innerWidth)+'px', tableHeight:(window.innerHeight-280)+'px',
    allowInsertRow:true, allowDeleteRow:true, columnSorting:false,
    contextMenu:(el,x,y)=>[{title:'위에 행 삽입',onclick:()=>jexcelInstance.insertRow(1,y,true)},{title:'아래에 행 삽입',onclick:()=>jexcelInstance.insertRow(1,y,false)},{type:'line'},{title:'행 삭제',onclick:()=>jexcelInstance.deleteRow(y)}],
    onchange:(instance,cell,x,y,value)=>{if(_isFormatting)return;sec[key].data=jexcelInstance.getData();showSS('수정됨');setTimeout(applyCellStyles,50);setTimeout(applyFilter,100);setTimeout(applyCompactDisplay,150);if(x>=4){const formatted=autoFormatAmount(value);if(formatted!==value){_isFormatting=true;jexcelInstance.setValueFromCoords(x,y,formatted,true);_isFormatting=false;}}},
    oninsertrow:()=>{sec[key].data=jexcelInstance.getData();setTimeout(applyCellStyles,50);setTimeout(applyFilter,100);setTimeout(applyCompactDisplay,150);},
    ondeleterow:()=>{sec[key].data=jexcelInstance.getData();setTimeout(applyCellStyles,50);setTimeout(applyFilter,100);setTimeout(applyCompactDisplay,150);},
    onselection:(instance,x1,y1,x2,y2)=>{showCellTooltip(x1,y1);},
    onblur:()=>{hideCellTooltip();},
    oneditionstart:(instance,cell,x,y)=>{if(x>=4){cell.setAttribute('inputmode','decimal');setTimeout(()=>{const el=cell.querySelector('input')||cell.querySelector('textarea');if(el)el.inputMode='decimal';},50);}},
    oneditionend:(instance,cell,x,y)=>{if(x>=4){cell.removeAttribute('inputmode');}setTimeout(applyCompactDisplay,80);}

  });
  setTimeout(applyCellStyles,100);
  setTimeout(applyFilter,150);
  setTimeout(applyFreezeColumnsCSS,200);
  setTimeout(applyCompactDisplay,250);
  updateSaveStatus();
}

function applyFreezeColumnsCSS(){
  if(!jexcelInstance||!activeYear||!activeSection)return;
  const sec=sections[activeYear];
  if(!sec)return;
  const table=document.querySelector('#spreadsheet .jexcel');
  if(!table)return;

  // 고정할 td: td[0](row번호), td[2](col B=통장분류+상세항목 합친 컬럼)만 freeze
  // td[1]=col A(1px), td[3]=col C(1px), td[4]=col D(1px) 숨김
  const headerCells=Array.from(table.querySelectorAll('thead tr:first-child td'));
  const getLeft=(idx)=>{let l=0;for(let i=0;i<idx&&i<headerCells.length;i++)l+=headerCells[i].offsetWidth;return l;};

  const left0=getLeft(0); // td[0] row header
  const left2=getLeft(2); // td[2] col B (after 1px col A)
  // first monthly td index = sec.monthStart+1 (data col) + 1 (row header) = sec.monthStart+2 in 0-indexed, +1 for nth-child
  const monthlyNth=sec.monthStart+2;

  let css='';
  // Freeze row-number col
  css+=`#spreadsheet .jexcel tr td:nth-child(1){position:sticky!important;left:${left0}px!important;z-index:4!important;background:#060a12!important;}\n`;
  // Freeze col B (merged item col)
  css+=`#spreadsheet .jexcel tr td:nth-child(3){position:sticky!important;left:${left2}px!important;z-index:3!important;background:#060a12!important;}\n`;

  css+=`#spreadsheet .jexcel tr td:nth-child(2),#spreadsheet .jexcel tr td:nth-child(4),#spreadsheet .jexcel tr td:nth-child(5){display:none!important;}\n`;
  // Divider on first monthly column

#spreadsheet .jexcel td.cell-category{color:var(--cyan)!important;}
#spreadsheet .jexcel td.cell-total{color:var(--primary-light)!important;}
#spreadsheet .jexcel td.selected,#spreadsheet .jexcel td.selection{background:rgba(56,217,192,0.15)!important;}\n`;

}

function applyCompactDisplay(){
  if(!jexcelInstance||jexcelInstance.edition)return; // 편집 중엔 스킵
  const table=document.querySelector('#spreadsheet .jexcel');
  if(!table)return;
  const rawData=jexcelInstance.getData(); // [col0,col1,col2,col3,monthly...]
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  table.querySelectorAll('tbody tr').forEach((row,rowIdx)=>{
    const cells=row.querySelectorAll('td');
    // td[0]=row#, td[1]=colA(숨김), td[2]=colB(표시), td[3]=colC(숨김), td[4]=colD(숨김), td[5]+=월별
    if(!cells[2])return;
    const d=rawData[rowIdx]||[];
    const cat=esc((d[1]||'').trim());    // 통장분류
    const detail=esc((d[2]||'').trim()); // 상세항목

    if(rowIdx===0){
      // 헤더행
      cells[2].innerHTML='<div style="font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text-muted)">항목</div>';
      return;
    }
    if(cat&&detail&&cat!==detail){
      cells[2].innerHTML=`<div style="font-size:10px;color:rgba(56,217,192,0.8);font-weight:600;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</div><div style="font-size:12px;color:var(--text);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${detail}</div>`;
    }else{
      const txt=cat||detail;
      cells[2].innerHTML=`<div style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${txt}</div>`;
    }
  });
}

function applyCellStyles(){
  if(!jexcelInstance)return;
  const data=jexcelInstance.getData();
  const numCols=data[0]?data[0].length:0;

  for(let r=0;r<data.length;r++){
    const row=data[r];
    const col1=(row[1]||'').trim();
    const isHeader=r===0; // first row is the header from extract()
    const isTotal=(col1==='합계'||col1==='계'||col1==='저축합계'||col1==='지출합계'||col1.includes('잔액'));

    for(let c=0;c<numCols;c++){
      const td=jexcelInstance.getCell([c,r]);
      if(!td)continue;
      // Clear previous custom classes
      td.classList.remove('cell-header','cell-category','cell-subcategory','cell-owner','cell-total');

      if(isHeader){
        td.classList.add('cell-header');
      } else if(isTotal){
        td.classList.add('cell-total');
      } else {
        // Category columns styling
        if(c===1) td.classList.add('cell-category');
        else if(c===2) td.classList.add('cell-subcategory');
        else if(c===3) td.classList.add('cell-owner');
      }

    }
  }
}

function showCellTooltip(x, y) {
  const tip = document.getElementById('cellTooltip');
  if (!tip || !jexcelInstance) { hideCellTooltip(); return; }

  const data = jexcelInstance.getData();
  if (y < 0 || y >= data.length) { hideCellTooltip(); return; }
  // 비월별 컬럼(col B=항목) 클릭 시 분류(owner) 표시
  const sec=sections[activeYear];
  if (x < (sec?sec.monthStart:4)) {
    if(y===0){hideCellTooltip();return;} // 헤더행 스킵
    const owner=(data[y][3]||'').trim();
    if(!owner){hideCellTooltip();return;}
    const cell=jexcelInstance.getCell([x,y]);
    if(!cell){hideCellTooltip();return;}
    const rect=cell.getBoundingClientRect();
    tip.innerHTML=`<div style="font-size:12px;padding:2px 0">담당: <strong style="color:var(--text)">${owner}</strong></div>`;
    tip.style.display='block';
    tip.style.left=Math.min(rect.left+4,window.innerWidth-120)+'px';
    tip.style.top=(rect.bottom+6)+'px';
    return;
  }
  if (x < 4) { hideCellTooltip(); return; }

  const val = parseNum(data[y][x]);
  if (val === 0) { hideCellTooltip(); return; }

  // MoM: 이전 월 열 (x-1, 같은 행), 1월(x=4)은 전년도 12월과 비교
  let momHtml = '';
  if (x > 4) {
    const prev = parseNum(data[y][x - 1]);
    if (prev !== 0) {
      const pct = (val - prev) / Math.abs(prev) * 100;
      const cls = pct > 0.01 ? 'up' : pct < -0.01 ? 'down' : 'flat';
      const sign = pct > 0 ? '+' : '';
      momHtml = `<div class="tt-label">MoM 전월대비</div><div class="tt-value ${cls}">${sign}${pct.toFixed(1)}%</div>`;
    }
  } else if (x === 4) {
    // 첫 번째 월: 전년도 마지막 월과 비교
    const prevYear = String(parseInt(activeYear) - 1);
    const prevSec = sections[prevYear];
    if (prevSec && prevSec[activeSection]) {
      const prevData = prevSec[activeSection].data;
      if (prevData && prevSec.months && prevSec.months.length) {
        const lastMonthCol = prevSec.months[prevSec.months.length - 1].col;
        const curRow = data[y];
        const itemKey = (curRow[1]||'')+'|'+(curRow[2]||'')+'|'+(curRow[3]||'');
        for (let pr = 0; pr < prevData.length; pr++) {
          const prevItemKey = (prevData[pr][1]||'')+'|'+(prevData[pr][2]||'')+'|'+(prevData[pr][3]||'');
          if (prevItemKey === itemKey) {
            const prev = parseNum(prevData[pr][lastMonthCol]);
            if (prev !== 0) {
              const pct = (val - prev) / Math.abs(prev) * 100;
              const cls = pct > 0.01 ? 'up' : pct < -0.01 ? 'down' : 'flat';
              const sign = pct > 0 ? '+' : '';
              momHtml = `<div class="tt-label">MoM 전월대비</div><div class="tt-value ${cls}">${sign}${pct.toFixed(1)}%</div>`;
            }
            break;
          }
        }
      }
    }
  }

  // YoY: 같은 월, 전년도 데이터
  let yoyHtml = '';
  const sec = sections[activeYear];
  if (sec && sec.months) {
    const monthIdx = x - 4; // 0-based month index in displayed data
    if (monthIdx >= 0 && monthIdx < sec.months.length) {
      const monthNum = monthNumFromLabel(sec.months[monthIdx].label);
      const prevYear = String(parseInt(activeYear) - 1);
      const prevSec = sections[prevYear];
      if (prevSec && prevSec[activeSection]) {
        // Find matching month column in previous year
        const prevMonthIdx = prevSec.months.findIndex(m => monthNumFromLabel(m.label) === monthNum);
        if (prevMonthIdx >= 0) {
          // Find matching row by item name (col1+col2+col3)
          const curRow = data[y];
          const itemKey = (curRow[1]||'')+'|'+(curRow[2]||'')+'|'+(curRow[3]||'');
          const prevData = prevSec[activeSection].data;
          for (let pr = 1; pr < prevData.length; pr++) {
            const prevItemKey = (prevData[pr][1]||'')+'|'+(prevData[pr][2]||'')+'|'+(prevData[pr][3]||'');
            if (prevItemKey === itemKey) {
              const prevVal = parseNum(prevData[pr][prevMonthIdx + 4]);
              if (prevVal !== 0) {
                const pct = (val - prevVal) / Math.abs(prevVal) * 100;
                const cls = pct > 0.01 ? 'up' : pct < -0.01 ? 'down' : 'flat';
                const sign = pct > 0 ? '+' : '';
                yoyHtml = `<div class="tt-divider"></div><div class="tt-label">YoY 전년동월</div><div class="tt-value ${cls}">${sign}${pct.toFixed(1)}%</div>`;
              }
              break;
            }
          }
        }
      }
    }
  }

  if (!momHtml && !yoyHtml) { hideCellTooltip(); return; }

  tip.innerHTML = momHtml + yoyHtml;

  // Position near the cell
  const cell = jexcelInstance.getCell([x, y]);
  if (!cell) { hideCellTooltip(); return; }
  const rect = cell.getBoundingClientRect();
  tip.style.display = 'block';
  tip.style.left = (rect.right + 8) + 'px';
  tip.style.top = (rect.top - 10) + 'px';

  // Ensure tooltip stays within viewport
  const tipRect = tip.getBoundingClientRect();
  if (tipRect.right > window.innerWidth) {
    tip.style.left = (rect.left - tipRect.width - 8) + 'px';
  }
  if (tipRect.bottom > window.innerHeight) {
    tip.style.top = (window.innerHeight - tipRect.height - 10) + 'px';
  }
}

function hideCellTooltip() {
  const tip = document.getElementById('cellTooltip');
  if (tip) tip.style.display = 'none';
}

function calcAllTotals(year){
  const sec=sections[year];if(!sec)return;
  const raw=rawSheets[year];if(!raw)return;
  const ms=sec.monthStart;
  const numCols=raw[0]?raw[0].length:0;
  // 소득/저축: 단순 합계
  for(const key of['income','savings']){
    const s=sec[key];if(!s||!s.rows)continue;
    let totalRow=-1;
    for(const r of s.rows){const c1=(raw[r][1]||'').trim();if(c1==='계'||c1==='합계')totalRow=r;}
    if(totalRow<0)continue;
    for(let c=ms;c<numCols;c++){
      let sum=0;
      for(const r of s.rows){if(r===totalRow)continue;sum+=parseNum(raw[r][c]);}
      raw[totalRow][c]=sum===0?'0':sum.toLocaleString('ko-KR');
    }
  }
  // 지출: 합계 + 잔액
  const exp=sec.expense;
  if(exp&&exp.rows){
    let totalRow=-1,balanceRow=-1;
    for(const r of exp.rows){const c1=(raw[r][1]||'').trim();if(c1==='계'||c1==='합계')totalRow=r;if(c1.includes('잔액'))balanceRow=r;}
    if(totalRow>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0;
        for(const r of exp.rows){if(r===totalRow||r===balanceRow)continue;sum+=parseNum(raw[r][c]);}
        raw[totalRow][c]=sum===0?'0':sum.toLocaleString('ko-KR');
      }
    }
    if(balanceRow>=0){
      // 소득계/저축계 행 찾기
      let incTotalRow=-1,savTotalRow=-1;
      if(sec.income)for(const r of sec.income.rows){const c1=(raw[r][1]||'').trim();if(c1==='계'||c1==='합계')incTotalRow=r;}
      if(sec.savings)for(const r of sec.savings.rows){const c1=(raw[r][1]||'').trim();if(c1==='계'||c1==='합계')savTotalRow=r;}
      for(let c=ms;c<numCols;c++){
        const inc=incTotalRow>=0?parseNum(raw[incTotalRow][c]):0;
        const sav=savTotalRow>=0?parseNum(raw[savTotalRow][c]):0;
        const exp2=totalRow>=0?parseNum(raw[totalRow][c]):0;
        const bal=inc-sav-exp2;
        raw[balanceRow][c]=bal===0?'0':(bal<0?'-':'')+Math.abs(bal).toLocaleString('ko-KR');
      }
    }
  }
  // 자산: 유동자산계 + 총계
  const ast=sec.asset;
  if(ast&&ast.rows){
    const EXCL=['부동산','연금저축','대출'];
    let fluidRow=-1,grandRow=-1;
    for(const r of ast.rows){const c1=(raw[r][1]||'').trim();if(c1==='유동자산계')fluidRow=r;if(c1==='계'||c1==='합계')grandRow=r;}
    if(fluidRow>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0,lastCat='';
        for(const r of ast.rows){
          if(r===fluidRow||r===grandRow)continue;
          const c1=(raw[r][1]||'').trim();if(c1)lastCat=c1;
          if(EXCL.includes(c1||lastCat))continue;
          sum+=parseNum(raw[r][c]);
        }
        raw[fluidRow][c]='₩'+sum.toLocaleString('ko-KR');
      }
    }
    if(grandRow>=0){
      for(let c=ms;c<numCols;c++){
        let sum=0;
        for(const r of ast.rows){if(r===fluidRow||r===grandRow)continue;sum+=parseNum(raw[r][c]);}
        raw[grandRow][c]='₩'+sum.toLocaleString('ko-KR');
      }
    }
  }
}
function syncSectionsToRaw(year){
  const sec=sections[year];
  if(!sec)return;
  const raw=rawSheets[year];
  for(const key of['income','savings','expense','asset']){
    const s=sec[key];
    if(!s||!s.rows||!s.data)continue;
    for(let i=1;i<s.data.length;i++){
      const origRow=s.rows[i-1];
      if(origRow!==undefined&&raw[origRow]){
        raw[origRow]=[...s.data[i]];
      }
    }
  }
}

function vrFmt(n, decimals=2){
  if(n==null || isNaN(n)) return '-';
  return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}
function vrFmtNum(n, decimals=2){
  if(n==null || isNaN(n)) return '-';
  return Number(n).toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
}

function vrGetInputs(){
  const g = id => {const el=document.getElementById(id); return el?parseFloat(el.value)||0:0;};
  const gs = id => {const el=document.getElementById(id); return el?el.value.trim():'';};
  return {
    ticker: gs('vr-ticker') || 'QLD',
    currentPrice: g('vr-currentPrice'),
    totalQuantity: g('vr-totalQuantity'),
    targetValue: g('vr-targetValue'),
    pool: g('vr-pool'),
    gradient: g('vr-gradient') || 10,
    bandPercent: g('vr-bandPercent') || 15,
    periodicAmount: g('vr-periodicAmount'),
    weekNumber: g('vr-weekNumber'),
  };
}

function vrCalculate(inp){
  const { currentPrice, totalQuantity, targetValue, pool, gradient, bandPercent, periodicAmount, weekNumber } = inp;

  // 1. 현재 평가금
  const currentEvaluation = totalQuantity * currentPrice;

  // 2. V값 업데이트 (실력공식)
  const poolContribution = pool / gradient;
  const skillAdjustment = (currentEvaluation - targetValue) / (2 * Math.sqrt(gradient));
  const newV = targetValue + poolContribution + skillAdjustment + periodicAmount;

  // 3. 밴드 계산
  const bandRate = bandPercent / 100;
  const minBand = newV * (1 - bandRate);
  const maxBand = newV * (1 + bandRate);

  // 4. Pool 사용 한도
  const decaySteps = Math.floor(weekNumber / 26);
  const poolLimit = Math.max(0.10, 0.75 - decaySteps * 0.05);
  const poolAvailable = pool * poolLimit;

  // 5. 매매 판단
  let signal = 'hold';
  if(currentEvaluation < minBand) signal = 'buy';
  else if(currentEvaluation > maxBand) signal = 'sell';

  // 6. 매수 주문 생성 (항상 생성 - 밴드 아래 가격에 지정가 대기)
  const buyOrders = [];
  if(currentPrice > 0){
    let spent = 0;
    for(let n=1; n<=20; n++){
      const targetQty = totalQuantity + n;
      const orderPrice = Math.round((minBand / targetQty) * 100) / 100;
      if(orderPrice <= 0) break;
      if(spent + orderPrice > poolAvailable) break;
      spent += orderPrice;
      buyOrders.push({ seq: n, targetQty, price: orderPrice, qty: 1 });
    }
  }

  // 7. 매도 주문 생성 (항상 생성 - 밴드 위 가격에 지정가 대기)
  const sellOrders = [];
  if(totalQuantity > 0 && currentPrice > 0){
    for(let n=1; n<=20; n++){
      const targetQty = totalQuantity - n;
      if(targetQty <= 0) break;
      const orderPrice = Math.round((maxBand / targetQty) * 100) / 100;
      sellOrders.push({ seq: n, targetQty, price: orderPrice, qty: 1 });
    }
  }

  return {
    currentEvaluation, newV, poolContribution, skillAdjustment,
    minBand, maxBand, signal, poolLimit, poolAvailable,
    buyOrders, sellOrders,
    diffPercent: targetValue ? ((currentEvaluation - targetValue) / targetValue * 100) : 0,
    vChange: newV - targetValue,
  };
}

function vrSave(){
  const inp = vrGetInputs();
  const r = vrCalculate(inp);
  const state = {
    ...inp,
    lastUpdated: new Date().toISOString(),
    computed: {
      currentEvaluation: r.currentEvaluation,
      newV: r.newV,
      minBand: r.minBand,
      maxBand: r.maxBand,
      signal: r.signal,
    }
  };
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vr-state.json'; a.click();
  URL.revokeObjectURL(url);
  vrShowToast('vr-state.json 다운로드 완료!');
}

function vrShowToast(msg){
  let toast = document.getElementById('vrToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'vrToast';
    toast.className = 'vr-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 2500);
}

async function init(){
  // Load AI summaries
  try{const r=await fetch('./summary.json?t='+Date.now());if(r.ok)aiSummaries=await r.json();}catch(e){}
  for(const f of['2025','2026']){try{const r=await fetch(`./${f}.csv?t=`+Date.now());if(r.ok){rawSheets[f]=parseCSV(await r.text());splitSections(f);calcAllTotals(f);splitSections(f);}}catch(e){}}
  if(!Object.keys(rawSheets).length){rawSheets['new']=[Array(20).fill('')];splitSections('new');}
  // Default to year matching today, or latest
  activeYear=rawSheets[String(THIS_YEAR)]?String(THIS_YEAR):Object.keys(rawSheets).pop();
  activeSection='dashboard';
  selectedMonthIdx=-1;
  renderYearTabs();renderSectionTabs();renderView();
}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();sheetDownload();}});
if(sessionStorage.getItem('auth')==='1') init();
